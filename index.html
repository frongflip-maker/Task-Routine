function calLoad(events){
  const h = events.reduce((s,e)=>s+hoursBetween(e.startTime,e.endTime),0);
  let label="Light"; if(h>8)label="Extreme"; else if(h>=6)label="Heavy"; else if(h>=3)label="Medium";

function computeDayMode(recovery, loadLabel){
  const light = loadLabel==="Light"||loadLabel==="Medium";
  if(recovery<35 || loadLabel==="Extreme") return "survival";
  if(recovery>=75) return light ? "push" : "productive";
  if(recovery>=50) return "balanced";

}

function computeScore({events, quests, reviewDone, streakActive}){
  const ratio = (arr)=>{ const done=arr.filter(x=>x.status==="done").length; return arr.length? done/arr.length : null; };
  const q = (b)=>quests.filter(x=>QUEST_TYPES[x.type]?.bucket===b);
  const buckets = [
    { key:"cal",    label:"Responsibility", weight:30, items:[...events, ...q("cal")] },
    { key:"growth", label:"Growth",         weight:30, items:q("growth") },
    { key:"money",  label:"Studio · Money", weight:15, items:q("money") },
    { key:"rec",    label:"Recovery",       weight:15, items:[...q("rec"), ...(reviewDone!==null?[{status:reviewDone?"done":"open"}]:[])] },
  ].map(b=>({ ...b, ratio: ratio(b.items), active: b.items.length>0 }));
  const bonusRatio = Math.min(1, (streakActive?0.4:0) + (quests.some(x=>x.type==="main"&&x.status==="done")?0.3:0) + (quests.some(x=>x.type==="boss"&&x.status==="done")?0.3:0));
  const active = buckets.filter(b=>b.active);
  const baseSum = active.reduce((s,b)=>s+b.weight,0) + 10;
  const scale = baseSum>0 ? 100/baseSum : 0;
  let score = bonusRatio * 10 * scale;
  active.forEach(b=>{ score += b.weight*scale*(b.ratio||0); });
  const out = buckets.map(b=>({ ...b, adjWeight: b.active? Math.round(b.weight*scale):0 }));
  out.push({ key:"bonus", label:"Bonus · Streak", weight:10, ratio:bonusRatio, active:true, adjWeight:Math.round(10*scale) });
  return { score: Math.round(score), buckets: out };
}

  if(rank==="C") return `ชนะขั้นต่ำแล้ว นั่นแหละสำคัญ · streak ${streak}`;
  return `วันนี้พักได้ การกลับมาเขียนรีวิวก็คือชนะ · streak ${streak}`;
}

/* ── Energy budget: งบพลังจาก recovery เทียบ energyCost ของอีเวนต์ ── */
const energyBudget = (recovery)=>Math.max(4, Math.round(recovery/7)); // recovery 72→10, 50→7, 35→5
function dayEnergy(events, recovery){
  const spent = events.reduce((s,e)=>s+(e.energyCost||0),0);
  const budget = energyBudget(recovery);
  const ratio = budget? spent/budget : 0;
  const status = ratio>1 ? "over" : ratio>=0.8 ? "tight" : "ok";
  return { spent, budget, ratio, status };
}

/* adapter ทุกตัวมีหน้าตาเดียวกัน: load() -> snapshot|null, save(snapshot) */
const localAdapter = {
  load(){ try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : null; } catch { return null; } },
  save(d){ try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} },
};
/* 🔮 อนาคต — ต่อ auto-sync ข้ามเครื่อง โดยไม่ต้องรื้อแอป:
   สร้าง adapter ใหม่ที่มี load()/save() หน้าตาเดียวกัน (async ได้) เช่น
     const supabaseAdapter = {
       async load(){ const {data} = await supabase.from("snapshots").select("data").eq("user_id",uid).single(); return data?.data ?? null; },
       async save(d){ await supabase.from("snapshots").upsert({ user_id:uid, data:d }); },
     };
   แล้วเปลี่ยน "const storage = localAdapter" บรรทัดล่างนี้บรรทัดเดียว
   ข้อมูลเดิม (snapshot ตัวเดียวกัน) ไหลขึ้น cloud ได้เลย ไม่ต้องกรอกใหม่ */

/* migrate: อัป schema เก่า -> ใหม่ ให้ไฟล์/ข้อมูลเดิมไม่พัง */
function migrate(snap){
  if(!snap || typeof snap!=="object") return null;
  const s = { ...snap };
  s.version ??= 1;
  // ตัวอย่างเผื่ออนาคต (เพิ่ม field โดยไม่ทำของเก่าพัง):
  // if(s.version < 2){ s.quests = (s.quests||[]).map(q=>({ priority:"normal", ...q })); s.version = 2; }
  s.events ??= []; s.quests ??= []; s.bookings ??= []; s.loyaltyBase ??= {};
  s.bookings = s.bookings.map(b=>{ const paid = b.paid ?? (b.paymentStatus==="Paid"); const done = b.done ?? (b.bookingStatus==="Completed"); return { deposit:0, ...b, paid, done }; });
  s.transactions ??= []; s.capital ??= 0;
  s.questTemplates ??= [];
  s.workouts ??= [];
  s.nutrition ??= {}; s.nutriTargets ??= { cal:2200, protein:140, carb:220, fat:70, sugar:40, sodium:2000, chol:300 };
  s.exPresets ??= [];
  s.activityTypes ??= defaultActivityTypes();
  s.workoutPresets ??= [];
  s.customLibrary ??= [];
  s.deckHidden ??= [];
  { // ย้ายเด็คเดิมเข้าคลัง (ครั้งเดียว): ข้ามรายการที่เคยลบ แล้วมาร์คทั้งหมดว่าจัดการแล้ว
    const hid=new Set(s.deckHidden);
    const allKeys=Object.entries(DECKS).flatMap(([d,its])=>its.map(t2=>d+"|"+t2));
    if(allKeys.some(k=>!hid.has(k))){
      s.activityTypes ??= defaultActivityTypes(); s.customLibrary ??= [];
      Object.entries(DECKS).forEach(([deck,items])=>{
        const vis=items.filter(t2=>!hid.has(deck+"|"+t2));
        if(!vis.length) return;
        let ty=s.activityTypes.find(t2=>t2.name===deck);
        if(!ty){ ty={ id:uid(), name:deck, color:(QUEST_TYPES[DECK_QTYPE[deck]]||{}).color||T.slate }; s.activityTypes.push(ty); }
        vis.forEach(title=>{ if(!s.customLibrary.some(x=>x.title===title)) s.customLibrary.push({ id:uid(), title, type:ty.id }); });
      });
      s.deckHidden=allKeys;
    }
  }
  { const seen=new Set(); s.questTemplates=(s.questTemplates||[]).map(t=>{ let id=t.id; if(!id||seen.has(id)) id=uid(); seen.add(id); return { ...t, id }; }); }
  s.fitnessSplit ??= null; s.fitnessStartDay ??= 1; s.fitnessConfirmed ??= {};
  s.driveConnected ??= false; s.driveFileId ??= null; s.autoSync ??= true;
  s.whoop ??= { recovery:72, sleep:81, strain:11.4 };
  s.reviews ??= {}; s.baseExp ??= 0;
  return s;
}

/* ════════════════ .ICS EXPORT (แจ้งเตือนผ่านปฏิทินเครื่อง — ไม่ต้องเชื่อม Google) ════════════════ */
const ICS_ALARM_MIN = 15; // เตือนล่วงหน้ากี่นาทีก่อนเริ่ม
function icsEsc(s){ return String(s==null?"":s).replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\r?\n/g,"\\n"); }
function icsFold(line){ // RFC5545: บรรทัดยาวเกิน 75 อักขระต้อง fold
  if(line.length<=74) return line;
  let out="", i=0; while(i<line.length){ const chunk=line.slice(i,i+ (i===0?74:73)); out += (i===0?"":"\r\n ")+chunk; i+=(i===0?74:73); } return out;
}
function icsDT(dateK, hm){ const [y,m,d]=(dateK||"").split("-"); const [H,M]=((hm||"09:00").split(":")); return `${y}${m}${d}T${H}${M}00`; } // floating local time = เวลาเครื่อง
function addHour(hm){ const [H,M]=(hm||"09:00").split(":").map(Number); const t=H*60+M+60; return `${String(Math.floor(t/60)%24).padStart(2,"0")}:${String(t%60).padStart(2,"0")}`; }
function eventToVEVENT(e){
  const start=icsDT(e.date, e.startTime||"09:00");
  const end=icsDT(e.date, e.endTime||addHour(e.startTime||"09:00"));
  const uidv=(e.id||Math.random().toString(36).slice(2))+"@discipline-os";
  const stamp=new Date().toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
  const descBits=[(EVENT_TYPES[e.type]||{}).label, e.location?`สถานที่: ${e.location}`:"", e.income?`รายรับ ฿${e.income}`:""].filter(Boolean).join(" · ");
  const L=[ "BEGIN:VEVENT", "UID:"+uidv, "DTSTAMP:"+stamp, "DTSTART:"+start, "DTEND:"+end, "SUMMARY:"+icsEsc(e.title) ];
  if(e.location) L.push("LOCATION:"+icsEsc(e.location));
  if(descBits) L.push("DESCRIPTION:"+icsEsc(descBits));
  L.push("BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+icsEsc(e.title||"แจ้งเตือน"),"TRIGGER:-PT"+ICS_ALARM_MIN+"M","END:VALARM","END:VEVENT");
  return L.map(icsFold).join("\r\n");
}
function buildICS(events){
  const evs=(events||[]).filter(e=>e.date && e.startTime);
  return ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Discipline OS//TH//EN","CALSCALE:GREGORIAN","METHOD:PUBLISH",
    ...evs.map(eventToVEVENT), "END:VCALENDAR"].join("\r\n");
}
function downloadICS(filename, events){
  const content=buildICS(events);
  const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent) || (navigator.platform==="MacIntel" && navigator.maxTouchPoints>1);
  const blob=new Blob([content], { type:"text/calendar;charset=utf-8" });
  const url=URL.createObjectURL(blob);
  if(isIOS){
    // iOS Safari: attribute download ถูกบล็อก → นำทางไปที่ blob URL ตรงๆ (ไม่มี download) iOS จะเปิดหน้า "เพิ่มลงปฏิทิน" ให้
    window.location.href = url;
    setTimeout(()=>{ try{ URL.revokeObjectURL(url); }catch{} }, 4000);
    return;
  }
  const a=document.createElement("a"); a.href=url; a.download=filename; a.rel="noopener";
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ try{ document.body.removeChild(a); }catch{} URL.revokeObjectURL(url); }, 800);
}

/* ════════════════ GOOGLE DRIVE (login + auto-save backup) ════════════════ */
const DRIVE_CLIENT_ID = "131799493461-df32kq5vdlbbkqg7n4r761kkea358l33.apps.googleusercontent.com";
const DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.email";
const DRIVE_FILENAME = "discipline-os-backup.json";
const drive = {
  _tc:null,
  ready(){ return typeof window!=="undefined" && window.google && window.google.accounts && window.google.accounts.oauth2; },
  connect(silent){
    return new Promise((resolve,reject)=>{
      if(!this.ready()){ reject(new Error("Google ยังไม่พร้อม — ต้องเปิดบนเว็บจริง (GitHub Pages) ไม่ใช่ preview")); return; }
      this._tc = window.google.accounts.oauth2.initTokenClient({
        client_id: DRIVE_CLIENT_ID, scope: DRIVE_SCOPE,
        callback:(resp)=>{ if(resp && resp.access_token) resolve(resp.access_token); else reject(new Error("ไม่ได้รับสิทธิ์")); },
        error_callback:(err)=>reject(err||new Error("เชื่อมไม่สำเร็จ")),
      });
      this._tc.requestAccessToken({ prompt: silent ? "" : "consent" });
    });
  },
  async userEmail(token){
    try{ const r=await fetch("https://www.googleapis.com/oauth2/v3/userinfo",{ headers:{ Authorization:"Bearer "+token } }); if(!r.ok) return ""; const d=await r.json(); return d.email||""; }catch{ return ""; }
  },
  async findFile(token){
    const q=encodeURIComponent(`name='${DRIVE_FILENAME}' and trashed=false`);
    const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=drive&fields=files(id,modifiedTime)&pageSize=1`,{ headers:{ Authorization:"Bearer "+token } });
    if(!r.ok) throw new Error("ค้นหาไฟล์ไม่สำเร็จ ("+r.status+")");
    const d=await r.json(); return (d.files && d.files[0]) || null;
  },
  async createFile(token){
    const r=await fetch("https://www.googleapis.com/drive/v3/files",{ method:"POST", headers:{ Authorization:"Bearer "+token, "Content-Type":"application/json" }, body:JSON.stringify({ name:DRIVE_FILENAME, mimeType:"application/json" }) });
    if(!r.ok) throw new Error("สร้างไฟล์ไม่สำเร็จ ("+r.status+")");
    const d=await r.json(); return d.id;
  },
  async writeMedia(token, fileId, obj){
    const r=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,{ method:"PATCH", headers:{ Authorization:"Bearer "+token, "Content-Type":"application/json" }, body:JSON.stringify(obj) });
    if(!r.ok){ const e=new Error("บันทึกไฟล์ไม่สำเร็จ ("+r.status+")"); e.status=r.status; throw e; }
    return true;
  },
  async read(token, fileId){
    const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{ headers:{ Authorization:"Bearer "+token } });
    if(!r.ok){ const e=new Error("อ่านไฟล์ไม่สำเร็จ ("+r.status+")"); e.status=r.status; throw e; }
    return r.json();
  },
};

  const buildSnapshot = () => ({ version:SCHEMA_VERSION, savedAt:new Date().toISOString(), events, quests, bookings, loyaltyBase, transactions, capital, questTemplates, workouts, nutrition, nutriTargets, exPresets, activityTypes, workoutPresets, customLibrary, deckHidden, fitnessSplit, fitnessStartDay, fitnessConfirmed, whoop, reviews, baseExp, driveConnected, driveFileId, autoSync });

  const ensureToken = async(silent)=>{

    drive.userEmail(token).then(em=>{ if(em) setDriveEmail(em); });

  };
  const connectDrive = async()=>{

      setDriveMsg("กำลังเชื่อม…");

  /* ---- auto-sync: หลังแก้ล่าสุด ~6 วิ push ขึ้น Drive (ทำงานหลังเซฟ/โหลดครั้งแรก เพื่อกันทับด้วย seed) ---- */

  const liveEarned = useMemo(()=>todayQuests.filter(q=>q.status==="done").reduce((s,q)=>s+expForQuest(q),0),[todayQuests]);
  const liveMinWin = todayQuests.some(q=>q.type==="main"&&q.status==="done") || (whoop.recovery<50 && todayQuests.some(q=>q.type==="recovery"&&q.status==="done"));
  const { score:liveScore, buckets } = useMemo(()=>computeScore({events:todayEvents, quests:todayQuests, reviewDone:isFinalized, streakActive:isFinalized?true:liveMinWin}),[todayEvents,todayQuests,isFinalized,liveMinWin]);
  const score = isFinalized ? selReview.score : liveScore;
  const rank = rankOf(score);
  const earnedExp = isFinalized ? selReview.earnedExp : liveEarned;
  const minWin = isFinalized ? selReview.minWin : liveMinWin;

  // ── EXP สะสมข้ามวันจริง ──
  const bankedExp = useMemo(()=>Object.values(reviews).reduce((s,r)=>s+(r.earnedExp||0),0),[reviews]);
  const todayFinalized = !!reviews[TK];
  const todayLive = useMemo(()=>quests.filter(q=>q.date===TK&&q.status==="done").reduce((s,q)=>s+expForQuest(q),0),[quests]);
  const totalExp = baseExp + bankedExp + (todayFinalized?0:todayLive);
  const level = levelFromExp(totalExp);

  // ── streak: วันต่อเนื่องที่ "ชนะขั้นต่ำ" จนถึงวันนี้ ──
  const streak = useMemo(()=>{
    const wonOn=(k,isToday)=> reviews[k]? reviews[k].minWin : (isToday? liveMinWin : false);
    let n=0; for(let i=0;i<400;i++){ const k=dkey(addDays(today,-i)); if(wonOn(k,i===0)) n++; else break; } return n;
  },[reviews,liveMinWin]);

  const toggleQuest=(id)=>setQuests(qs=>qs.map(q=>q.id===id?{...q,status:q.status==="done"?"open":"done"}:q));
  const toggleEvent=(id)=>setEvents(es=>es.map(e=>e.id===id?{...e,status:e.status==="done"?"scheduled":"done"}:e));
  const toggleEventPaid=(id)=>setEvents(es=>es.map(e=>e.id===id?{...e,paid:!e.paid}:e));
  const addQuest=(q)=>setQuests(qs=>[...qs,{ id:uid(), status:"open", date:sel, ...q }]);
  const delQuest=(id)=>setQuests(qs=>qs.filter(q=>q.id!==id));
  // Quest templates
  const saveTemplate=(name, items)=>setQuestTemplates(ts=>[...ts,{ id:uid(), name, items }]);
  const delTemplate=(id)=>setQuestTemplates(ts=>ts.filter(t=>t.id!==id));
  const applyTemplate=(tpl)=>setQuests(qs=>[...qs, ...tpl.items.map(it=>({ id:uid(), status:"open", date:sel, title:it.title, type:it.type, difficulty:it.difficulty }))]);
  // Fitness
  const saveFitnessSplit=(split)=>setFitnessSplit(split);
  const confirmFitnessWeek=(weekKey, evs)=>{ setEvents(es=>[...es, ...evs.map(e=>({ id:uid(), status:"scheduled", ...e }))]); setFitnessConfirmed(m=>({ ...m, [weekKey]:true })); };

  /* ── .ics export → ปฏิทินเครื่อง (แจ้งเตือน native) ── */
  const exportEventICS=(e)=>{ downloadICS(`event-${e.date||dkey(new Date())}.ics`, [e]); setEvents(es=>es.map(x=>x.id===e.id?{ ...x, icsAdded:true }:x)); fireToast("กำลังเปิดปฏิทิน — กด “เพิ่ม” เพื่อรับแจ้งเตือน"); };
  const exportDayICS=(dateK)=>{
    const list=events.filter(e=>e.date===dateK && e.startTime);
    if(!list.length){ fireToast("วันนี้ไม่มี event ที่ตั้งเวลาไว้", "err"); return; }
    downloadICS(`วันนี้-${dateK}.ics`, list); const ids=new Set(list.map(x=>x.id)); setEvents(es=>es.map(x=>ids.has(x.id)?{ ...x, icsAdded:true }:x)); fireToast(`ส่ง ${list.length} event เข้าปฏิทินเครื่อง`);
  };
  const exportWeekICS=(weekDays)=>{
    const keys=weekDays.map(dkey);
    const list=events.filter(e=>keys.includes(e.date) && e.startTime);
    if(!list.length){ fireToast("สัปดาห์นี้ไม่มี event ที่ตั้งเวลาไว้", "err"); return; }
    downloadICS(`สัปดาห์-${keys[0]}.ics`, list); const ids=new Set(list.map(x=>x.id)); setEvents(es=>es.map(x=>ids.has(x.id)?{ ...x, icsAdded:true }:x)); fireToast(`ส่ง ${list.length} event เข้าปฏิทินเครื่อง`);
  };

  const addEvent=(e)=>{ setEvents(es=>[...es,{ id:uid(), status:"scheduled", date:sel, ...e }]); };
  const editEvent=(id, patch)=>{ setEvents(es=>es.map(e=>e.id===id?{ ...e, ...patch }:e)); };
  const delEvent=(id)=>{ setEvents(es=>es.filter(e=>e.id!==id)); };

  const addBooking=(b)=>{
    setBookings(bs=>[...bs,{ id:uid(), ...b }]);
    setEvents(es=>[...es,{ id:uid(), title:`ห้องซ้อม: ${b.bandName}`, type:"studio", date:b.date, startTime:b.startTime, endTime:b.endTime, location:"Studio", energyCost:1, status:"scheduled", income:b.totalPrice }]);
    setQuests(qs=>[...qs,
      { id:uid(), title:`เตรียมห้องให้ ${b.bandName}`, type:"tiny", difficulty:"Easy", date:b.date, status:"open" },
      { id:uid(), title:`เก็บเงิน + บันทึกรายรับ (${b.bandName})`, type:"studio", difficulty:"Easy", date:b.date, status:"open" },
    ]);
  };
  // ── จบวัน: ล็อกคะแนน + แบงก์ EXP เข้าสะสม ──
  const finalizeDay=(answers)=>{
    const earned = liveEarned + 10; // +10 จาก Daily Review
    const { score:sc } = computeScore({events:todayEvents, quests:todayQuests, reviewDone:true, streakActive:true});
    const rec = { ...answers, score:sc, rank:rankOf(sc).r, earnedExp:earned, minWin:true, whoop:{...whoop}, ts:new Date().toISOString() };
    setReviews(rv=>({ ...rv, [sel]:rec }));
    return rec;
  };
  const reopenDay=()=>setReviews(rv=>{ const c={...rv}; delete c[sel]; return c; });
  const resetLoyalty=(band, totalHours)=>setLoyaltyBase(m=>({ ...m, [band]: totalHours })); // ตั้ง base = ชั่วโมงรวมปัจจุบัน → ตัวนับกลับเป็น 0
  const togglePaid=(id)=>setBookings(bs=>bs.map(b=>b.id===id?{...b,paid:!b.paid}:b));
  const markBookingPaid=(id,method)=>setBookings(bs=>bs.map(b=>b.id===id?{...b,paid:true,payMethod:method}:b));

  const delBooking=(id)=>setBookings(bs=>bs.filter(b=>b.id!==id));
  const delBand=(band)=>{ setBookings(bs=>bs.filter(b=>b.bandName!==band)); setLoyaltyBase(m=>{ const c={...m}; delete c[band]; return c; }); };
  const addTxn=(t)=>setTransactions(ts=>[...ts,{ id:uid(), ...t }]);
  const delTxn=(id)=>setTransactions(ts=>ts.filter(t=>t.id!==id));
  const updateCapital=(v)=>setCapital(Number(v)||0);

  const shared = { T, sel, setSel, events: allEvents, todayEvents, quests, todayQuests, bookings, whoop, setWhoop, reviews,
    loyaltyBase, resetLoyalty, togglePaid, toggleBookingDone, delBooking, delBand,
    transactions, addTxn, delTxn, capital, updateCapital,
    load, mode, M, score, buckets, rank, level, totalExp, earnedExp, streak, minWin, liveMinWin, liveScore,
    isFinalized, selReview, finalizeDay, reopenDay,
    exportEventICS, exportDayICS, exportWeekICS,
    questTemplates, saveTemplate, delTemplate, applyTemplate,
    fitnessSplit, saveFitnessSplit, fitnessStartDay, setFitnessStartDay, fitnessConfirmed, confirmFitnessWeek,
    workouts, updateWorkouts:setWorkouts,
    nutrition, setNutrition, nutriTargets, setNutriTargets, exPresets, setExPresets, activityTypes, setActivityTypes, workoutPresets, setWorkoutPresets, customLibrary, setCustomLibrary, deckHidden, setDeckHidden,
    toggleQuest, toggleEvent, toggleEventPaid, delEvent, editEvent, addQuest, delQuest, addEvent, addBooking, markBookingPaid, openSettings:()=>setSettingsOpen(true) };

  const NAV=[["today",Home,"Today"],["calendar",CalendarDays,"Calendar"],["quests",Swords,"Activity"],["studio",Music,"Studio"],["budget",Wallet,"Budget"],["fitness",Dumbbell,"Fitness"],["dashboard",BarChart3,"Dashboard"]];

  return (

      <div className="w-full max-w-md flex flex-col min-h-screen relative">
        {/* sync chip */}
        <button onClick={()=>setSettingsOpen(true)} className="absolute left-1/2 -translate-x-1/2 z-40 flex items-center gap-1.5 px-2.5 py-1.5 rounded-full active:scale-95"
          style={{ top:"calc(12px + env(safe-area-inset-top))", background:hex(T.surf,.9), border:`1px solid ${driveToken?(syncState==="error"?T.red:hex(T.green,.5)):T.border}`, backdropFilter:"blur(6px)" }}>
          <Cloud size={13} style={{ color: driveToken?(syncState==="error"?T.red:syncState==="saving"?T.blue:T.green):T.muted }}/>
          <span className="text-[10px] font-bold" style={{ color: driveToken?T.text:T.muted }}>
            {!driveToken ? "ล็อกอิน" : syncState==="saving" ? "กำลังเซฟ…" : syncState==="error" ? "ผิดพลาด" : syncState==="saved" ? "ซิงค์แล้ว" : "Drive"}
          </span>
        </button>
        <main className="flex-1 pb-24">
          {tab==="today" && <Today {...shared}/>}
          {tab==="calendar" && <Calendar {...shared}/>}
          {tab==="quests" && <Quests {...shared}/>}
          {tab==="studio" && <Studio {...shared}/>}
          {tab==="budget" && <Budget {...shared}/>}
          {tab==="fitness" && <Fitness {...shared}/>}
          {tab==="dashboard" && <Dashboard {...shared}/>}
        </main>
        {/* Toast */}
        {toast && (
          <div className="fixed left-0 right-0 flex justify-center z-50 pointer-events-none" style={{bottom:88}}>
            <div className="mx-4 px-4 py-2.5 rounded-xl flex items-center gap-2 text-xs font-semibold shadow-lg max-w-md"
              style={{background:toast.kind==="err"?hex(T.red,.95):hex(T.green,.95), color:toast.kind==="err"?"#fff":"#000", border:`1px solid ${toast.kind==="err"?T.red:T.green}`}}>
              {toast.kind==="err" ? <AlertCircle size={15}/> : <Check size={15}/>}

        <nav className="fixed bottom-0 left-0 right-0 flex justify-center z-30" style={{paddingBottom:"env(safe-area-inset-bottom)"}}>

              {NAV.map(([id,Icon,label])=>{

                return (

                    className="flex flex-col items-center gap-0.5 px-1.5 py-1.5 rounded-xl transition active:scale-90">

        {settingsOpen && (

            <Glass className="p-3 mb-3 flex items-start gap-2">
              <Cloud size={16} style={{color:T.green}} className="mt-0.5 shrink-0"/>
              <div className="text-xs" style={{color:T.sub}}>เซฟอัตโนมัติลงเครื่องนี้ทุกการกด (localStorage) — เปิดใหม่ข้อมูลค้างเอง <span style={{color:T.muted}}>· ในหน้า preview นี้ยังรีเซ็ต เพราะ sandbox ปิด storage แต่บนเว็บจริงค้างถาวร</span></div>
            </Glass>

            {/* ── Google Drive ── */}

                <Cloud size={16}/> เข้าสู่ระบบด้วย Google

                    <div className="min-w-0">
                      <div className="text-[10px]" style={{color:T.muted}}>ล็อกอินแล้ว</div>
                      <div className="text-xs font-semibold truncate">{driveEmail||"บัญชี Google"}</div>
                    </div>

                  <button onClick={disconnectDrive} aria-label="ออกจากระบบ" className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0" style={{color:T.muted}}><LogOut size={15}/></button>

            <div className="text-[10px] mt-1 px-1" style={{color:T.muted}}>ไฟล์เดียว <span style={{color:T.sub}}>discipline-os-backup.json</span> · ทับกันแบบ last-write-wins · ใช้ได้บนเว็บจริง (GitHub Pages) เท่านั้น</div>

              <div className="text-[11px] mb-2" style={{color:T.muted}}>ลบ event / quest / การจอง / วง / รายรับ-จ่าย / EXP ทั้งหมดในเครื่องนี้ เริ่มจากศูนย์ — กด Export หรือ Save ขึ้น Drive ก่อนถ้าอยากเก็บไว้</div>
              {confirmClear ? (
                <div className="flex gap-2">
                  <button onClick={()=>{ clearAllData(); setConfirmClear(false); }} className="flex-1 py-2.5 rounded-xl font-bold" style={{background:T.red, color:"#fff"}}>ยืนยันล้างทั้งหมด</button>
                  <button onClick={()=>setConfirmClear(false)} className="flex-1 py-2.5 rounded-xl font-bold" style={{background:T.surf2, color:T.sub, border:`1px solid ${T.border}`}}>ยกเลิก</button>

              ) : (
                <button onClick={()=>setConfirmClear(true)} className="w-full py-2.5 rounded-xl font-bold flex items-center justify-center gap-2" style={{background:hex(T.red,.14), color:T.red, border:`1px solid ${hex(T.red,.5)}`}}><Trash2 size={15}/> ล้างข้อมูลทั้งหมด</button>
              )}
            </div>
          </Sheet>
        )}
      </div>
    </div>
  );
}
