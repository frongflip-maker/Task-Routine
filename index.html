function calLoad(events){

function computeDayMode(recovery, loadLabel){
  const light = loadLabel==="Light"||loadLabel==="Medium";
  if(recovery<35 || loadLabel==="Extreme") return "survival";
  if(recovery>=75) return light ? "push" : "productive";

function computeScore({events, quests, reviewDone, streakActive}){
  const ratio = (arr)=>{ const done=arr.filter(x=>x.status==="done").length; return arr.length? done/arr.length : null; };
  const q = (b)=>quests.filter(x=>QUEST_TYPES[x.type]?.bucket===b);
  const buckets = [
    { key:"cal",    label:"Responsibility", weight:30, items:[...events, ...q("cal")] },
    { key:"growth", label:"Growth",         weight:30, items:q("growth") },
    { key:"money",  label:"Studio · Money", weight:15, items:q("money") },
    { key:"rec",    label:"Recovery",       weight:15, items:[...q("rec"), ...(reviewDone!==null?[{status:reviewDone?"done":"open"}]:[])] },
  ].map(b=>({ ...b, ratio: ratio(b.items), active: b.items.length>0 }));
  const bonusRatio = Math.min(1, (streakActive?0.4:0) + (quests.some(x=>x.type==="main"&&x.status==="done")?0.3:0) + (quests.some(x=>x.type==="boss"&&x.status==="done")?0.3:0));
  const active = buckets.filter(b=>b.active);
  const baseSum = active.reduce((s,b)=>s+b.weight,0) + 10;
  const scale = baseSum>0 ? 100/baseSum : 0;
  let score = bonusRatio * 10 * scale;
  active.forEach(b=>{ score += b.weight*scale*(b.ratio||0); });
  const out = buckets.map(b=>({ ...b, adjWeight: b.active? Math.round(b.weight*scale):0 }));
  out.push({ key:"bonus", label:"Bonus · Streak", weight:10, ratio:bonusRatio, active:true, adjWeight:Math.round(10*scale) });
  return { score: Math.round(score), buckets: out };
}

  if(rank==="C") return `ชนะขั้นต่ำแล้ว นั่นแหละสำคัญ · streak ${streak}`;
  return `วันนี้พักได้ การกลับมาเขียนรีวิวก็คือชนะ · streak ${streak}`;
}

/* ── Energy budget: งบพลังจาก recovery เทียบ energyCost ของอีเวนต์ ── */
const energyBudget = (recovery)=>Math.max(4, Math.round(recovery/7)); // recovery 72→10, 50→7, 35→5
function dayEnergy(events, recovery){
  const spent = events.reduce((s,e)=>s+(e.energyCost||0),0);
  const budget = energyBudget(recovery);
  const ratio = budget? spent/budget : 0;
  const status = ratio>1 ? "over" : ratio>=0.8 ? "tight" : "ok";
  return { spent, budget, ratio, status };
}

/* adapter ทุกตัวมีหน้าตาเดียวกัน: load() -> snapshot|null, save(snapshot) */

  load(){ try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : null; } catch { return null; } },
  save(d){ try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} },

/* migrate: อัป schema เก่า -> ใหม่ ให้ไฟล์/ข้อมูลเดิมไม่พัง */
function migrate(snap){
  if(!snap || typeof snap!=="object") return null;
  const s = { ...snap };
  s.version ??= 1;
  // ตัวอย่างเผื่ออนาคต (เพิ่ม field โดยไม่ทำของเก่าพัง):
  // if(s.version < 2){ s.quests = (s.quests||[]).map(q=>({ priority:"normal", ...q })); s.version = 2; }
  s.events ??= []; s.quests ??= []; s.bookings ??= []; s.loyaltyBase ??= {};
  s.bookings = s.bookings.map(b=>{ const paid = b.paid ?? (b.paymentStatus==="Paid"); const done = b.done ?? (b.bookingStatus==="Completed"); return { deposit:0, ...b, paid, done }; });
  s.transactions ??= []; s.capital ??= 0;
  s.questTemplates ??= [];
  s.workouts ??= [];
  s.fitnessSplit ??= null; s.fitnessStartDay ??= 1; s.fitnessConfirmed ??= {};
  s.driveConnected ??= false; s.driveFileId ??= null; s.autoSync ??= true;
  s.whoop ??= { recovery:72, sleep:81, strain:11.4 };
  s.reviews ??= {}; s.baseExp ??= 0;
  return s;
}

const ICS_ALARM_MIN = 15; // เตือนล่วงหน้ากี่นาทีก่อนเริ่ม
function icsEsc(s){ return String(s==null?"":s).replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\r?\n/g,"\\n"); }
function icsFold(line){ // RFC5545: บรรทัดยาวเกิน 75 อักขระต้อง fold
  if(line.length<=74) return line;
  let out="", i=0; while(i<line.length){ const chunk=line.slice(i,i+ (i===0?74:73)); out += (i===0?"":"\r\n ")+chunk; i+=(i===0?74:73); } return out;
}
function icsDT(dateK, hm){ const [y,m,d]=(dateK||"").split("-"); const [H,M]=((hm||"09:00").split(":")); return `${y}${m}${d}T${H}${M}00`; } // floating local time = เวลาเครื่อง
function addHour(hm){ const [H,M]=(hm||"09:00").split(":").map(Number); const t=H*60+M+60; return `${String(Math.floor(t/60)%24).padStart(2,"0")}:${String(t%60).padStart(2,"0")}`; }
function eventToVEVENT(e){
  const start=icsDT(e.date, e.startTime||"09:00");
  const end=icsDT(e.date, e.endTime||addHour(e.startTime||"09:00"));
  const uidv=(e.id||Math.random().toString(36).slice(2))+"@discipline-os";
  const stamp=new Date().toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
  const descBits=[(EVENT_TYPES[e.type]||{}).label, e.location?`สถานที่: ${e.location}`:"", e.income?`รายรับ ฿${e.income}`:""].filter(Boolean).join(" · ");
  const L=[ "BEGIN:VEVENT", "UID:"+uidv, "DTSTAMP:"+stamp, "DTSTART:"+start, "DTEND:"+end, "SUMMARY:"+icsEsc(e.title) ];
  if(e.location) L.push("LOCATION:"+icsEsc(e.location));
  if(descBits) L.push("DESCRIPTION:"+icsEsc(descBits));
  L.push("BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+icsEsc(e.title||"แจ้งเตือน"),"TRIGGER:-PT"+ICS_ALARM_MIN+"M","END:VALARM","END:VEVENT");
  return L.map(icsFold).join("\r\n");
}
function buildICS(events){
  const evs=(events||[]).filter(e=>e.date && e.startTime);
  return ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Discipline OS//TH//EN","CALSCALE:GREGORIAN","METHOD:PUBLISH",
    ...evs.map(eventToVEVENT), "END:VCALENDAR"].join("\r\n");
}
function downloadICS(filename, events){
  const content=buildICS(events);
  const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent) || (navigator.platform==="MacIntel" && navigator.maxTouchPoints>1);
  const blob=new Blob([content], { type:"text/calendar;charset=utf-8" });
  const url=URL.createObjectURL(blob);
  if(isIOS){
    // iOS Safari: attribute download ถูกบล็อก → นำทางไปที่ blob URL ตรงๆ (ไม่มี download) iOS จะเปิดหน้า "เพิ่มลงปฏิทิน" ให้
    window.location.href = url;
    setTimeout(()=>{ try{ URL.revokeObjectURL(url); }catch{} }, 4000);
    return;
  }
  const a=document.createElement("a"); a.href=url; a.download=filename; a.rel="noopener";
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ try{ document.body.removeChild(a); }catch{} URL.revokeObjectURL(url); }, 800);
}

/* ════════════════ GOOGLE DRIVE (login + auto-save backup) ════════════════ */
const DRIVE_CLIENT_ID = "131799493461-df32kq5vdlbbkqg7n4r761kkea358l33.apps.googleusercontent.com";
const DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.email";
const DRIVE_FILENAME = "discipline-os-backup.json";
const drive = {
  _tc:null,
  ready(){ return typeof window!=="undefined" && window.google && window.google.accounts && window.google.accounts.oauth2; },
  connect(silent){
    return new Promise((resolve,reject)=>{
      if(!this.ready()){ reject(new Error("Google ยังไม่พร้อม — ต้องเปิดบนเว็บจริง (GitHub Pages) ไม่ใช่ preview")); return; }
      this._tc = window.google.accounts.oauth2.initTokenClient({
        client_id: DRIVE_CLIENT_ID, scope: DRIVE_SCOPE,
        callback:(resp)=>{ if(resp && resp.access_token) resolve(resp.access_token); else reject(new Error("ไม่ได้รับสิทธิ์")); },
        error_callback:(err)=>reject(err||new Error("เชื่อมไม่สำเร็จ")),
      });
      this._tc.requestAccessToken({ prompt: silent ? "" : "consent" });
    });
  },
  async userEmail(token){
    try{ const r=await fetch("https://www.googleapis.com/oauth2/v3/userinfo",{ headers:{ Authorization:"Bearer "+token } }); if(!r.ok) return ""; const d=await r.json(); return d.email||""; }catch{ return ""; }
  },
  async findFile(token){
    const q=encodeURIComponent(`name='${DRIVE_FILENAME}' and trashed=false`);
    const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=drive&fields=files(id,modifiedTime)&pageSize=1`,{ headers:{ Authorization:"Bearer "+token } });
    if(!r.ok) throw new Error("ค้นหาไฟล์ไม่สำเร็จ ("+r.status+")");
    const d=await r.json(); return (d.files && d.files[0]) || null;
  },
  async createFile(token){
    const r=await fetch("https://www.googleapis.com/drive/v3/files",{ method:"POST", headers:{ Authorization:"Bearer "+token, "Content-Type":"application/json" }, body:JSON.stringify({ name:DRIVE_FILENAME, mimeType:"application/json" }) });
    if(!r.ok) throw new Error("สร้างไฟล์ไม่สำเร็จ ("+r.status+")");
    const d=await r.json(); return d.id;
  },
  async writeMedia(token, fileId, obj){
    const r=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,{ method:"PATCH", headers:{ Authorization:"Bearer "+token, "Content-Type":"application/json" }, body:JSON.stringify(obj) });
    if(!r.ok){ const e=new Error("บันทึกไฟล์ไม่สำเร็จ ("+r.status+")"); e.status=r.status; throw e; }
    return true;
  },
  async read(token, fileId){
    const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{ headers:{ Authorization:"Bearer "+token } });
    if(!r.ok){ const e=new Error("อ่านไฟล์ไม่สำเร็จ ("+r.status+")"); e.status=r.status; throw e; }
    return r.json();
  },
};

  const [syncState, setSyncState] = useState("idle"); // idle|saving|saved|error

  const [lastSync, setLastSync] = useState(null);
  const syncTimer = React.useRef(null);

  /* ---- persistence: load ครั้งเดียวตอนเปิด, แล้ว auto-save ทุกการเปลี่ยน ---- */
  const buildSnapshot = () => ({ version:SCHEMA_VERSION, savedAt:new Date().toISOString(), events, quests, bookings, loyaltyBase, transactions, capital, questTemplates, workouts, fitnessSplit, fitnessStartDay, fitnessConfirmed, whoop, reviews, baseExp, driveConnected, driveFileId, autoSync });
  const applySnapshot = (s) => {
    if(!s) return;
    if(s.events) setEvents(s.events);
    if(s.quests) setQuests(s.quests);
    if(s.bookings) setBookings(s.bookings);
    if(s.loyaltyBase) setLoyaltyBase(s.loyaltyBase);
    if(s.transactions) setTransactions(s.transactions);
    if(typeof s.capital==="number") setCapital(s.capital);
    if(s.questTemplates) setQuestTemplates(s.questTemplates);
    if(s.workouts) setWorkouts(s.workouts);
    if(s.fitnessSplit!==undefined && s.fitnessSplit!==null) setFitnessSplit(s.fitnessSplit);
    if(typeof s.fitnessStartDay==="number") setFitnessStartDay(s.fitnessStartDay);
    if(s.fitnessConfirmed) setFitnessConfirmed(s.fitnessConfirmed);
    if(s.whoop) setWhoop(s.whoop);
    if(s.reviews) setReviews(s.reviews);
    if(typeof s.baseExp==="number") setBaseExp(s.baseExp);
    if(typeof s.driveConnected==="boolean") setDriveConnected(s.driveConnected);
    if(s.driveFileId) setDriveFileId(s.driveFileId);
    if(typeof s.autoSync==="boolean") setAutoSync(s.autoSync);
  };
  useEffect(()=>{ const s = migrate(storage.load()); if(s) applySnapshot(s); setLoaded(true); }, []);
  useEffect(()=>{ if(loaded) storage.save(buildSnapshot()); }, [loaded, events, quests, bookings, loyaltyBase, transactions, capital, questTemplates, workouts, fitnessSplit, fitnessStartDay, fitnessConfirmed, whoop, reviews, baseExp, driveConnected, driveFileId, autoSync]);

  /* ---- Google Drive: reconnect เงียบตอนเปิดแอป (ได้ token ไว้ ไม่ push/pull อัตโนมัติเพื่อกันทับข้อมูล) ---- */
  useEffect(()=>{
    if(!loaded || !driveConnected || driveToken) return;
    let cancelled=false;
    (async()=>{
      try{
        const token=await drive.connect(true); if(cancelled) return;
        setDriveToken(token);
        drive.userEmail(token).then(em=>{ if(!cancelled && em) setDriveEmail(em); });
        if(!driveFileId){ try{ const f=await drive.findFile(token); if(!cancelled && f) setDriveFileId(f.id); }catch{} }
      }catch{ /* ต่อเงียบไม่ได้ → ให้กดเชื่อมเอง */ }
    })();

  }, [loaded, driveConnected]);

  const clearAllData = () => {

  };
  /* ---- Google Drive: connect / save / load / disconnect ---- */
  const ensureToken = async(silent)=>{
    if(driveToken) return driveToken;
    const token=await drive.connect(silent);
    setDriveToken(token);
    drive.userEmail(token).then(em=>{ if(em) setDriveEmail(em); });

  };
  const connectDrive = async()=>{
    try{
      setDriveMsg("กำลังเชื่อม…");
      const token=await ensureToken(false);
      setDriveConnected(true);
      const em=await drive.userEmail(token); if(em) setDriveEmail(em);
      let fid=driveFileId;
      if(!fid){ const f=await drive.findFile(token); if(f){ fid=f.id; setDriveFileId(f.id); } }
      setDriveMsg(fid ? "เชื่อมแล้ว ✓ พบไฟล์สำรองบน Drive — กด “โหลดจาก Drive” เพื่อดึงมาใช้ หรือ “Save” เพื่อทับด้วยข้อมูลเครื่องนี้" : "เชื่อมแล้ว ✓ ยังไม่มีไฟล์สำรอง — กด “Save” เพื่อสร้างครั้งแรก");
    }catch(e){ setDriveMsg("เชื่อมไม่สำเร็จ: "+(e.message||e)); }

  const saveToDrive = async(silent)=>{
    try{
      setSyncState("saving"); if(!silent) setDriveMsg("กำลังบันทึกขึ้น Drive…");
      const token=await ensureToken(true).catch(()=>ensureToken(false));
      let fid=driveFileId;

      setSyncReady(true); setDriveConnected(true); setSyncState("saved"); setLastSync(Date.now());

  // Fitness
  const saveFitnessSplit=(split)=>setFitnessSplit(split);
  const confirmFitnessWeek=(weekKey, evs)=>{ setEvents(es=>[...es, ...evs.map(e=>({ id:uid(), status:"scheduled", ...e }))]); setFitnessConfirmed(m=>({ ...m, [weekKey]:true })); };

  /* ── .ics export → ปฏิทินเครื่อง (แจ้งเตือน native) ── */
  const exportEventICS=(e)=>{ downloadICS(`event-${e.date||dkey(new Date())}.ics`, [e]); fireToast("กำลังเปิดปฏิทิน — กด “เพิ่ม” เพื่อรับแจ้งเตือน"); };

    ]);
  };
  // ── จบวัน: ล็อกคะแนน + แบงก์ EXP เข้าสะสม ──
  const finalizeDay=(answers)=>{
    const earned = liveEarned + 10; // +10 จาก Daily Review

    setReviews(rv=>({ ...rv, [sel]:rec }));
    return rec;
  };
  const reopenDay=()=>setReviews(rv=>{ const c={...rv}; delete c[sel]; return c; });
  const resetLoyalty=(band, totalHours)=>setLoyaltyBase(m=>({ ...m, [band]: totalHours })); // ตั้ง base = ชั่วโมงรวมปัจจุบัน → ตัวนับกลับเป็น 0
  const togglePaid=(id)=>setBookings(bs=>bs.map(b=>b.id===id?{...b,paid:!b.paid}:b));
  const toggleBookingDone=(id)=>setBookings(bs=>bs.map(b=>b.id===id?{...b,done:!b.done, bookingStatus:!b.done?"Completed":"Scheduled"}:b));
  const delBooking=(id)=>setBookings(bs=>bs.filter(b=>b.id!==id));
  const delBand=(band)=>{ setBookings(bs=>bs.filter(b=>b.bandName!==band)); setLoyaltyBase(m=>{ const c={...m}; delete c[band]; return c; }); };
  const addTxn=(t)=>setTransactions(ts=>[...ts,{ id:uid(), ...t }]);
  const delTxn=(id)=>setTransactions(ts=>ts.filter(t=>t.id!==id));
  const updateCapital=(v)=>setCapital(Number(v)||0);

  const shared = { T, sel, setSel, events: allEvents, todayEvents, quests, todayQuests, bookings, whoop, setWhoop, reviews,
    loyaltyBase, resetLoyalty, togglePaid, toggleBookingDone, delBooking, delBand,
    transactions, addTxn, delTxn, capital, updateCapital,
    load, mode, M, score, buckets, rank, level, totalExp, earnedExp, streak, minWin, liveMinWin, liveScore,
    isFinalized, selReview, finalizeDay, reopenDay,
    exportEventICS, exportDayICS, exportWeekICS,
    questTemplates, saveTemplate, delTemplate, applyTemplate,
    fitnessSplit, saveFitnessSplit, fitnessStartDay, setFitnessStartDay, fitnessConfirmed, confirmFitnessWeek,
    workouts, updateWorkouts:setWorkouts,
    toggleQuest, toggleEvent, toggleEventPaid, delEvent, editEvent, addQuest, delQuest, addEvent, addBooking, openSettings:()=>setSettingsOpen(true) };

  const NAV=[["today",Home,"Today"],["calendar",CalendarDays,"Calendar"],["quests",Swords,"Quests"],["studio",Music,"Studio"],["budget",Wallet,"Budget"],["fitness",Dumbbell,"Fitness"],["dashboard",BarChart3,"Dashboard"]];

  return (

      {/* ambient glow */}
      <div className="fixed inset-0 pointer-events-none" style={{background:`radial-gradient(600px 300px at 80% -5%, ${hex(M.color,.12)}, transparent 70%), radial-gradient(500px 300px at 0% 10%, ${hex(T.purple,.08)}, transparent 70%)`}}/>
      <div className="w-full max-w-md flex flex-col min-h-screen relative">
        {/* sync chip */}
        <button onClick={()=>setSettingsOpen(true)} className="absolute top-3 left-1/2 -translate-x-1/2 z-40 flex items-center gap-1.5 px-2.5 py-1.5 rounded-full active:scale-95"
          style={{ background:hex(T.surf,.9), border:`1px solid ${driveToken?(syncState==="error"?T.red:hex(T.green,.5)):T.border}`, backdropFilter:"blur(6px)" }}>
          <Cloud size={13} style={{ color: driveToken?(syncState==="error"?T.red:syncState==="saving"?T.blue:T.green):T.muted }}/>
          <span className="text-[10px] font-bold" style={{ color: driveToken?T.text:T.muted }}>
            {!driveToken ? "ล็อกอิน" : syncState==="saving" ? "กำลังเซฟ…" : syncState==="error" ? "ผิดพลาด" : syncState==="saved" ? "ซิงค์แล้ว" : "Drive"}
          </span>
        </button>
        <main className="flex-1 pb-24">
          {tab==="today" && <Today {...shared}/>}
          {tab==="calendar" && <Calendar {...shared}/>}
          {tab==="quests" && <Quests {...shared}/>}
          {tab==="studio" && <Studio {...shared}/>}
          {tab==="budget" && <Budget {...shared}/>}
          {tab==="fitness" && <Fitness {...shared}/>}
          {tab==="dashboard" && <Dashboard {...shared}/>}
        </main>
        {/* Toast */}
        {toast && (
          <div className="fixed left-0 right-0 flex justify-center z-50 pointer-events-none" style={{bottom:88}}>

              style={{background:toast.kind==="err"?hex(T.red,.95):hex(T.green,.95), color:toast.kind==="err"?"#fff":"#000", border:`1px solid ${toast.kind==="err"?T.red:T.green}`}}>

        {/* Bottom nav */}
        <nav className="fixed bottom-0 left-0 right-0 flex justify-center z-30">
          <div className="w-full max-w-md px-3 pb-3 pt-2" style={{background:`linear-gradient(to top, ${T.bg}, ${hex(T.bg,.85)} 70%, transparent)`}}>
            <div className="flex items-center justify-around rounded-2xl py-1.5" style={{background:hex(T.surf,.9), border:`1px solid ${T.border}`, backdropFilter:"blur(8px)"}}>
              {NAV.map(([id,Icon,label])=>{

              })}
            </div>
          </div>
        </nav>

        {settingsOpen && (
          <Sheet onClose={()=>{ setSettingsOpen(false); setDataMsg(""); setConfirmClear(false); }} title="ข้อมูล & แบ็กอัพ">
            <Glass className="p-3 mb-3 flex items-start gap-2">
              <Cloud size={16} style={{color:T.green}} className="mt-0.5 shrink-0"/>
              <div className="text-xs" style={{color:T.sub}}>เซฟอัตโนมัติลงเครื่องนี้ทุกการกด (localStorage) — เปิดใหม่ข้อมูลค้างเอง <span style={{color:T.muted}}>· ในหน้า preview นี้ยังรีเซ็ต เพราะ sandbox ปิด storage แต่บนเว็บจริงค้างถาวร</span></div>
            </Glass>

            {/* ── Google Drive ── */}
            <Label>บัญชี Google · ซิงค์ขึ้น Drive</Label>
            {!driveToken ? (

                <Cloud size={16}/> เข้าสู่ระบบด้วย Google
              </button>
            ) : (

                  <div className="flex items-center gap-2 min-w-0">
                    <span className="w-7 h-7 rounded-full flex items-center justify-center shrink-0" style={{background:hex(T.green,.16)}}><Check size={14} style={{color:T.green}}/></span>
                    <div className="min-w-0">
                      <div className="text-[10px]" style={{color:T.muted}}>ล็อกอินแล้ว</div>
                      <div className="text-xs font-semibold truncate">{driveEmail||"บัญชี Google"}</div>
                    </div>
                  </div>
                  <button onClick={disconnectDrive} aria-label="ออกจากระบบ" className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0" style={{color:T.muted}}><LogOut size={15}/></button>
                </div>
                <div className="flex gap-2">
                  <button onClick={()=>saveToDrive(false)} className="flex-1 py-2.5 rounded-xl font-bold flex items-center justify-center gap-1.5 active:scale-[.98]" style={{background:T.green, color:"#000"}}><Cloud size={15}/> Save ขึ้น Drive</button>
                  <button onClick={loadFromDrive} className="flex-1 py-2.5 rounded-xl font-bold flex items-center justify-center gap-1.5 active:scale-[.98]" style={{background:T.surf2, color:T.text, border:`1px solid ${T.border}`}}><Download size={15}/> โหลดจาก Drive</button>
                </div>
                <button onClick={()=>setAutoSync(a=>!a)} className="w-full flex items-center justify-between p-2.5 rounded-xl active:scale-[.99]" style={{background:T.surf2, border:`1px solid ${autoSync?hex(T.green,.4):T.border}`}}>
                  <span className="text-xs font-semibold" style={{color:autoSync?T.green:T.sub}}>ซิงค์อัตโนมัติ (หลังแก้ ~6 วิ)</span>
                  <span className="w-9 h-5 rounded-full flex items-center px-0.5 transition" style={{background:autoSync?T.green:T.border, justifyContent:autoSync?"flex-end":"flex-start"}}><span className="w-4 h-4 rounded-full" style={{background:"#fff"}}/></span>
                </button>
              </div>
            )}
            {driveMsg && <div className="text-[11px] mt-1.5 px-1" style={{color: driveMsg.includes("ไม่สำเร็จ")||driveMsg.includes("หมดอายุ")?T.red:T.muted}}>{driveMsg}</div>}
            <div className="text-[10px] mt-1 px-1" style={{color:T.muted}}>ไฟล์เดียว <span style={{color:T.sub}}>discipline-os-backup.json</span> · ทับกันแบบ last-write-wins · ใช้ได้บนเว็บจริง (GitHub Pages) เท่านั้น</div>

            <div className="mt-4"></div>
            <Label>สำรอง/ย้ายเครื่องแบบไฟล์ (offline)</Label>

            <div className="flex gap-2 mb-1">
              <button onClick={exportData} className="flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-[.98]" style={{background:T.blue,color:"#000"}}>
                <Download size={16}/> Export JSON
              </button>
              <label className="flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-[.98] cursor-pointer" style={{background:T.surf2,color:T.text,border:`1px solid ${T.border}`}}>
                <Upload size={16}/> Import
                <input type="file" accept="application/json,.json" className="hidden" onChange={e=>{ if(e.target.files[0]) importData(e.target.files[0]); }}/>
              </label>
            </div>
            {dataMsg && <div className="text-xs mt-2 px-1" style={{color:T.green}}>{dataMsg}</div>}

            <div className="mt-4 mb-1"><Label>แจ้งเตือน (ผ่านปฏิทินเครื่อง)</Label></div>

              </div>
            </div>

            <div className="mt-5 p-3 rounded-xl" style={{border:`1px dashed ${hex(T.red,.5)}`}}>
              <div className="text-xs font-bold mb-1" style={{color:T.red}}>ล้างข้อมูลทั้งหมด (เริ่มใหม่)</div>
              <div className="text-[11px] mb-2" style={{color:T.muted}}>ลบ event / quest / การจอง / วง / รายรับ-จ่าย / EXP ทั้งหมดในเครื่องนี้ เริ่มจากศูนย์ — กด Export หรือ Save ขึ้น Drive ก่อนถ้าอยากเก็บไว้</div>
              {confirmClear ? (
                <div className="flex gap-2">
                  <button onClick={()=>{ clearAllData(); setConfirmClear(false); }} className="flex-1 py-2.5 rounded-xl font-bold" style={{background:T.red, color:"#fff"}}>ยืนยันล้างทั้งหมด</button>
                  <button onClick={()=>setConfirmClear(false)} className="flex-1 py-2.5 rounded-xl font-bold" style={{background:T.surf2, color:T.sub, border:`1px solid ${T.border}`}}>ยกเลิก</button>
                </div>
              ) : (
                <button onClick={()=>setConfirmClear(true)} className="w-full py-2.5 rounded-xl font-bold flex items-center justify-center gap-2" style={{background:hex(T.red,.14), color:T.red, border:`1px solid ${hex(T.red,.5)}`}}><Trash2 size={15}/> ล้างข้อมูลทั้งหมด</button>

/* ════════════════ TODAY ════════════════ */
function Today(props){
  const { sel, todayEvents, todayQuests, whoop, setWhoop, load, mode, M, score, buckets, rank, level, totalExp, earnedExp, streak, minWin, isFinalized, selReview, finalizeDay, reopenDay, toggleQuest, toggleEvent, toggleEventPaid, addQuest, openSettings, exportEventICS } = props;
  const d = parseK(sel);
  const expPct = (totalExp%100);
  const lowDay = mode==="recovery"||mode==="survival";
  const [reviewOpen, setReviewOpen] = useState(false);

  // suggestions by mode
  const sugg = useMemo(()=>{
    const pick=(deck,n)=>DECKS[deck].slice(0,n).map(title=>({deck,title}));
    if(mode==="survival") return pick("Recovery",2);
    if(mode==="recovery") return [...pick("Recovery",2),...pick("Body",1)];
    if(mode==="balanced") return [...pick("Music",1),...pick("Content",1),...pick("Recovery",1)];
    if(mode==="productive") return [...pick("Music",1),...pick("Studio",1),...pick("Recovery",1)];
    return [...pick("Music",1),...pick("Content",1),...pick("Body",1),...pick("Money",1)];
  },[mode]);

  return (
    <div className="px-4 pt-5 space-y-4">
      {/* header */}
      <div className="flex items-center justify-between">
        <div>
          <div className="text-xs font-semibold tracking-widest uppercase" style={{color:M.color}}>Command Center</div>
          <h1 className="text-2xl font-extrabold">{TH_D[d.getDay()]} {d.getDate()} {TH_M[d.getMonth()]}</h1>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={openSettings} aria-label="ข้อมูลและแบ็กอัพ" className="w-10 h-10 rounded-xl flex items-center justify-center active:scale-90" style={{background:hex(T.surf2,.9),border:`1px solid ${T.border}`}}>
            <Settings size={17} style={{color:T.sub}}/>
          </button>
          <Glass className="px-3 py-2 flex items-center gap-2" glowColor={T.gold}>
            <span className={streak>0?"flame-anim":""} style={{display:"inline-flex"}}><Flame size={18} style={{color:streak>0?T.orange:T.muted}}/></span>
            <div className="leading-none"><div className="text-lg font-extrabold">{streak}</div><div className="text-[9px]" style={{color:T.muted}}>STREAK</div></div>
          </Glass>
        </div>
      </div>

      {/* Level + EXP */}
      <Glass className="p-4">
        <div className="flex items-center justify-between mb-2">
          <div className="flex items-center gap-2"><Sparkles size={16} style={{color:T.purple}}/><span className="font-bold">{levelName(level)}</span></div>
          <span className="text-sm font-bold" style={{color:T.purple}}>LV {level}</span>
        </div>
        <Bar value={expPct} color={T.purple}/>
        <div className="flex justify-between mt-1.5 text-[11px]" style={{color:T.muted}}>
          <span>{totalExp} EXP</span><span>+{earnedExp} วันนี้ · อีก {100-expPct} ถึง LV {level+1}</span>
        </div>
      </Glass>

      {/* Day Mode + Score hero */}
      <Glass className="p-4" glowColor={M.color}>
        <div className="flex items-center gap-4">
          <Ring value={score} color={rank.c} label={score} sub="/100"/>
          <div className="flex-1 min-w-0">
            <Pill color={M.color} solid>{M.label}</Pill>
            <div className="text-xs mt-1.5" style={{color:T.sub}}>{M.tag}</div>
            <div className="flex items-center gap-2 mt-2">
              <Pill color={rank.c}><Trophy size={11}/> {rank.r==="Recovery"?"Recovery Day":`${rank.r} Rank`}</Pill>
              <Pill color={load.label==="Extreme"?T.red:load.label==="Heavy"?T.orange:T.green}>Load: {load.label}</Pill>
            </div>
          </div>
        </div>
        {/* score breakdown */}
        <div className="grid grid-cols-5 gap-1.5 mt-3">
          {buckets.map(b=>(
            <div key={b.key} className="text-center">
              <div className="h-12 flex items-end justify-center rounded-md overflow-hidden" style={{background:T.surf2}}>
                <div className="w-full rounded-md" style={{height:`${Math.max(8,(b.ratio||0)*100)}%`, background:(b.ratio||0)>0?M.color:T.border}}/>
              </div>
              <div className="text-[8px] mt-1 leading-tight" style={{color:T.muted}}>{b.label}</div>
              <div className="text-[8px] font-bold" style={{color:T.sub}}>{b.adjWeight}%</div>
            </div>
          ))}
        </div>
      </Glass>

      {/* WHOOP input */}
      <Glass className="p-4">
        <div className="flex items-center gap-2 mb-3"><Heart size={15} style={{color:T.green}}/><span className="font-bold text-sm">WHOOP วันนี้</span><span className="text-[10px]" style={{color:T.muted}}>(กรอกเอง · MVP)</span></div>
        {[["recovery","Recovery","%",0,100,T.green],["sleep","Sleep","%",0,100,T.cyan],["strain","Strain","",0,21,T.orange]].map(([k,lbl,unit,mn,mx,c])=>(
          <div key={k} className="mb-3 last:mb-0">
            <div className="flex justify-between text-xs mb-1"><span style={{color:T.sub}}>{lbl}</span><span className="font-bold" style={{color:c}}>{whoop[k]}{unit}</span></div>
            <input type="range" min={mn} max={mx} step={k==="strain"?0.1:1} value={whoop[k]}
              onChange={e=>setWhoop(w=>({...w,[k]:Number(e.target.value)}))}
              className="w-full" style={{accentColor:c}}/>
          </div>
        ))}
      </Glass>

      {/* Energy budget */}
      {(()=>{
        const en = dayEnergy(todayEvents, whoop.recovery);
        const c = en.status==="over"?T.red:en.status==="tight"?T.orange:T.green;
        const msg = en.status==="over" ? "วันนี้แน่นเกินงบพลัง — ลดเควสต์ที่ไม่ด่วน เลื่อนงานที่เลื่อนได้ หรือสลับเป็นโหมดฟื้นตัว"
          : en.status==="tight" ? "เริ่มแน่นแล้ว เผื่อแรงไว้หน่อย อย่าเพิ่มงานเกินจำเป็น"
          : "ยังไหว มีพลังเหลือ จะเพิ่มเควสต์ได้อีก";
        return (
          <Glass className="p-4" glowColor={en.status==="over"?T.red:undefined}>
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-2"><Battery size={15} style={{color:c}}/><span className="font-bold text-sm">Energy Budget</span></div>
              <span className="text-xs font-bold" style={{color:c}}>{en.spent}/{en.budget}</span>
            </div>
            <Bar value={en.ratio*100} color={c}/>
            <div className="text-[11px] mt-2" style={{color: en.status==="ok"?T.sub:c}}>{msg}</div>
          </Glass>
        );
      })()}

      {/* Timeline */}
      <Section title="Timeline" icon={Clock}>
        {todayEvents.length===0 ? <Empty text="วันนี้ยังไม่มีอีเวนต์ — เพิ่มได้ในหน้า Calendar"/> :
          <div className="space-y-2">{todayEvents.map(e=>{
            const ET=EVENT_TYPES[e.type]; const done=e.status==="done";

              <Glass key={e.id} className="p-3 flex items-center gap-3" style={{borderLeft:`3px solid ${ET.color}`, opacity:done?0.6:1}}>
                <button onClick={()=>toggleEvent(e.id)} className="w-6 h-6 rounded-md flex items-center justify-center shrink-0" style={{background:done?ET.color:"transparent", border:`2px solid ${done?ET.color:T.border}`}}>{done&&<Check size={14} color="#000"/>}</button>
                <div className="w-12 text-center shrink-0"><div className="text-xs font-bold tabular-nums">{e.startTime||"—"}</div><div className="text-[9px]" style={{color:T.muted}}>{e.endTime}</div></div>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-sm truncate" style={{textDecoration:done?"line-through":"none"}}>{e.title}</div>
                  <div className="flex items-center gap-1.5 mt-0.5 flex-wrap"><ET.Icon size={11} style={{color:ET.color}}/><span className="text-[10px]" style={{color:T.muted}}>{ET.label}{e.income?` · ฿${e.income}`:""}</span>
                    {e.location && <button onClick={()=>openMaps(e.location)} className="inline-flex items-center gap-0.5 text-[10px] font-semibold" style={{color:T.blue}}><MapPin size={11}/>{e.location}</button>}
                    {Number(e.income)>0 && e.type!=="studio" && <button onClick={()=>toggleEventPaid(e.id)} className="inline-flex items-center gap-0.5 text-[10px] font-bold px-1.5 py-0.5 rounded-full" style={{background:e.paid?hex(T.green,.16):hex(T.orange,.16), color:e.paid?T.green:T.orange}}>{e.paid?<><Check size={10}/> รับแล้ว</>:"ยังไม่รับเงิน"}</button>}
                  </div>
                </div>
                {e.startTime && <button onClick={()=>exportEventICS(e)} aria-label="เพิ่มลงปฏิทินเครื่อง"
                  className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 active:scale-90" style={{background:hex(T.green,.16), color:T.green}}><CalendarPlus size={15}/></button>}
              </Glass>
            );
          })}</div>}
      </Section>

      {/* Quest board */}
      <Section title="Today Quests" icon={Swords}>
        <div className="space-y-2">
          {todayQuests.map(q=><QuestRow key={q.id} q={q} onToggle={toggleQuest}/>)}
          {todayQuests.length===0 && <Empty text="ยังไม่มีเควสต์ — เพิ่มจาก Suggested ด้านล่าง หรือหน้า Quests"/>}
        </div>
      </Section>

      {/* Daily Review / End of day */}
      {isFinalized ? (
        <Glass className="p-4" glowColor={rankOf(selReview.score).c}>
          <div className="flex items-center gap-3">
            <Ring value={selReview.score} color={rankOf(selReview.score).c} size={72} label={selReview.score} sub="/100"/>
            <div className="flex-1">
              <div className="flex items-center gap-2"><Check size={15} style={{color:T.green}}/><span className="font-bold text-sm">บันทึกวันนี้แล้ว</span></div>
              <div className="flex items-center gap-2 mt-1.5">
                <Pill color={rankOf(selReview.score).c}><Trophy size={11}/>{selReview.rank==="Recovery"?"Recovery Day":`${selReview.rank} Rank`}</Pill>
                <Pill color={T.purple}><Zap size={11}/>+{selReview.earnedExp}</Pill>
              </div>
              <div className="text-[11px] mt-1.5" style={{color:T.sub}}>{encourage(selReview.rank, streak)}</div>
            </div>
          </div>
          <button onClick={reopenDay} className="text-[11px] mt-3" style={{color:T.muted}}>แก้ไขรีวิวอีกครั้ง</button>
        </Glass>
      ) : (
        <button onClick={()=>setReviewOpen(true)} className="w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-2 active:scale-[.98] transition"
          style={{background:`linear-gradient(120deg, ${M.color}, ${T.purple})`, color:"#fff", boxShadow:glow(M.color)}}>
          <Moon size={18}/> จบวัน · Daily Review
        </button>
      )}

      {reviewOpen && <DailyReviewModal mode={mode} M={M} liveScore={score} liveExp={earnedExp+10} streak={minWin?streak:streak+1}
        onClose={()=>setReviewOpen(false)} onSubmit={finalizeDay}/>}

      {/* Suggested */}
      <Section title={lowDay?"วันนี้พักได้ ไม่ต้องฝืน":"Suggested Quests"} icon={Sparkles}>
        {lowDay && <div className="text-xs mb-2 px-1" style={{color:T.cyan}}>{mode==="survival"?"แค่ผ่านวันนี้ + ดูแลตัวเอง ก็คือชนะแล้ว 💪":"โหมดฟื้นตัว — เลือกทำเบาๆ พอ ไม่มี Boss Fight"}</div>}
        <div className="space-y-2">
          {sugg.map((s,i)=>(
            <Glass key={i} className="p-3 flex items-center gap-3">
              <Pill color={QUEST_TYPES[DECK_QTYPE[s.deck]].color}>{s.deck}</Pill>
              <span className="flex-1 text-sm truncate">{s.title}</span>
              <button onClick={()=>addQuest({ title:s.title, type:DECK_QTYPE[s.deck], difficulty:DECK_DIFF[s.deck] })}
                className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 active:scale-90" style={{background:hex(M.color,.18), color:M.color}}><Plus size={16}/></button>
            </Glass>
          ))}
        </div>
      </Section>
    </div>
  );
}

/* ════════════════ CALENDAR ════════════════ */
const CAL_VIEWS = [["day","วัน"],["week","สัปดาห์"],["month","เดือน"]];

function Calendar(props){
  const { sel, setSel, events, addEvent, editEvent, toggleEvent, toggleEventPaid, delEvent, addQuest, exportEventICS, exportDayICS, exportWeekICS } = props;
  const d = parseK(sel);
  const [view,setView]=useState("day");
  const [open,setOpen]=useState(false);
  const [editEv,setEditEv]=useState(null);
  const [convEvent,setConvEvent]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null);

  const week = useMemo(()=>{const s=addDays(d,-d.getDay());return Array.from({length:7},(_,i)=>addDays(s,i));},[sel]);
  const dayEvents = events.filter(e=>e.date===sel).sort((a,b)=>toMin(a.startTime)-toMin(b.startTime));
  const countOn = (k)=>events.filter(e=>e.date===k).length;

  // นำทางตามมุมมอง: วัน=±1วัน, สัปดาห์=±7วัน, เดือน=±1เดือน
  const step=(dir)=>{
    if(view==="month"){ const nd=new Date(d.getFullYear(), d.getMonth()+dir, 1); setSel(dkey(nd)); }
    else { setSel(dkey(addDays(d, dir*(view==="week"?7:1)))); }
  };
  const headerLabel = view==="month" ? `${TH_M[d.getMonth()]} ${d.getFullYear()}`
    : view==="week" ? `${week[0].getDate()} ${TH_M[week[0].getMonth()]} – ${week[6].getDate()} ${TH_M[week[6].getMonth()]}`
    : `${TH_D[d.getDay()]} ${d.getDate()} ${TH_M[d.getMonth()]} ${d.getFullYear()}`;

  // month grid
  const monthCells = useMemo(()=>{
    const first=new Date(d.getFullYear(), d.getMonth(), 1);
    const lead=first.getDay();
    const days=new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
    const cells=[]; for(let i=0;i<lead;i++) cells.push(null);
    for(let dd=1; dd<=days; dd++) cells.push(new Date(d.getFullYear(), d.getMonth(), dd));
    while(cells.length%7!==0) cells.push(null);
    return cells;
  },[sel]);

  const onAdd=(e)=>{ addEvent(e); setOpen(false); };
  const onEdit=(patch)=>{ editEvent(editEv.id, patch); setEditEv(null); };

  const EventRow=(e)=>{
    const ET=EVENT_TYPES[e.type]||EVENT_TYPES.other; const done=e.status==="done";
    return (
      <Glass key={e.id} className="p-3" style={{borderLeft:`3px solid ${ET.color}`, opacity:done?0.6:1}}>
        <div className="flex items-center gap-2">
          <button onClick={()=>toggleEvent(e.id)} className="w-6 h-6 rounded-md flex items-center justify-center shrink-0" style={{background:done?ET.color:"transparent",border:`2px solid ${done?ET.color:T.border}`}}>{done&&<Check size={14} color="#000"/>}</button>
          <div className="flex-1 min-w-0">
            <div className="font-semibold text-sm truncate">{e.title}</div>
            <div className="flex items-center gap-1.5 mt-0.5 flex-wrap">
              <ET.Icon size={11} style={{color:ET.color}}/>
              <span className="text-[10px]" style={{color:T.muted}}>{e.startTime?`${e.startTime}–${e.endTime} · `:""}{ET.label}{e.income?` · ฿${e.income}`:""}</span>
              {e.location && <button onClick={()=>openMaps(e.location)} className="inline-flex items-center gap-0.5 text-[10px] font-semibold" style={{color:T.blue}}><MapPin size={11}/>{e.location}</button>}
              {Number(e.income)>0 && e.type!=="studio" && (
                <button onClick={()=>toggleEventPaid(e.id)} className="inline-flex items-center gap-0.5 text-[10px] font-bold px-1.5 py-0.5 rounded-full" style={{background:e.paid?hex(T.green,.16):hex(T.orange,.16), color:e.paid?T.green:T.orange}}>
                  {e.paid ? <><Check size={10}/> รับแล้ว</> : "ยังไม่รับเงิน"}
                </button>
              )}
            </div>
          </div>
          <div className="flex items-center gap-1 shrink-0">
            {e.startTime && <button onClick={()=>exportEventICS(e)} aria-label="เพิ่มลงปฏิทินเครื่อง"
              className="w-7 h-7 rounded-lg flex items-center justify-center" style={{color:T.green}}><CalendarPlus size={15}/></button>}
            <button onClick={()=>setConvEvent(e)} aria-label="แปลงเป็น Quest"
              className="w-7 h-7 rounded-lg flex items-center justify-center" style={{color:T.gold}}><Wand2 size={14}/></button>
            <button onClick={()=>setEditEv(e)} aria-label="แก้ไข event"
              className="w-7 h-7 rounded-lg flex items-center justify-center" style={{color:T.blue}}><Pencil size={14}/></button>
            {confirmDel===e.id ? (
              <button onClick={()=>{ delEvent(e.id); setConfirmDel(null); }}
                className="text-[10px] font-bold px-2 py-1 rounded-lg" style={{background:T.red, color:"#fff"}}>ลบ?</button>
            ) : (
              <button onClick={()=>setConfirmDel(e.id)} aria-label="ลบ event"
                className="w-7 h-7 rounded-lg flex items-center justify-center" style={{color:T.muted}}><Trash2 size={14}/></button>
            )}
          </div>
        </div>
      </Glass>
    );
  };

  return (
    <div className="px-4 pt-5 space-y-4">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-extrabold">Calendar</h1>
        <div className="flex gap-1.5">
          <button onClick={()=>exportDayICS(sel)} className="text-[11px] font-bold px-2.5 py-1.5 rounded-lg flex items-center gap-1 active:scale-95" style={{background:hex(T.green,.14), color:T.green, border:`1px solid ${hex(T.green,.4)}`}}><CalendarPlus size={12}/> วันนี้</button>
          <button onClick={()=>exportWeekICS(week)} className="text-[11px] font-bold px-2.5 py-1.5 rounded-lg flex items-center gap-1 active:scale-95" style={{background:hex(T.green,.14), color:T.green, border:`1px solid ${hex(T.green,.4)}`}}><CalendarPlus size={12}/> สัปดาห์</button>
        </div>
      </div>

      {/* view toggle */}
      <div className="flex gap-1 p-1 rounded-xl" style={{background:T.surf, border:`1px solid ${T.border}`}}>
        {CAL_VIEWS.map(([k,label])=>{ const on=view===k;
          return <button key={k} onClick={()=>setView(k)} className="flex-1 py-2 rounded-lg text-xs font-bold transition"
            style={{background:on?T.purple:"transparent", color:on?"#fff":T.sub, boxShadow:on?glow(T.purple,.25):"none"}}>{label}</button>;
        })}
      </div>

      {/* nav row */}
      <div className="flex items-center justify-between">
        <button onClick={()=>step(-1)} aria-label="ก่อนหน้า" className="w-9 h-9 rounded-xl flex items-center justify-center active:scale-95" style={{background:T.surf, border:`1px solid ${T.border}`}}><ChevronLeft size={18}/></button>
        <button onClick={()=>setSel(dkey(new Date()))} className="text-sm font-bold px-3 py-1.5 rounded-lg" style={{color:T.text}}>{headerLabel}</button>
        <button onClick={()=>step(1)} aria-label="ถัดไป" className="w-9 h-9 rounded-xl flex items-center justify-center active:scale-95" style={{background:T.surf, border:`1px solid ${T.border}`}}><ChevronRight size={18}/></button>
      </div>

      {/* week strip — โชว์ในมุมมองวัน/สัปดาห์ */}
      {view!=="month" && (
        <div className="flex gap-1.5">
          {week.map(wd=>{ const k=dkey(wd); const on=k===sel; const n=countOn(k);
            return (
              <button key={k} onClick={()=>setSel(k)} className="flex-1 py-2 rounded-xl flex flex-col items-center gap-1 transition"
                style={{background:on?T.purple:T.surf, border:`1px solid ${on?T.purple:T.border}`, boxShadow:on?glow(T.purple):"none"}}>
                <span className="text-[9px]" style={{color:on?"#fff":T.muted}}>{TH_D[wd.getDay()]}</span>
                <span className="text-base font-bold" style={{color:on?"#fff":T.text}}>{wd.getDate()}</span>
                <span className="w-1 h-1 rounded-full" style={{background:n?(on?"#fff":T.purple):"transparent"}}/>
              </button>
            );
          })}
        </div>
      )}

      <button onClick={()=>setOpen(true)} className="w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-[.98]" style={{background:T.purple, color:"#fff", boxShadow:glow(T.purple)}}>
        <Plus size={18}/> เพิ่ม Event
      </button>

      {/* ===== MONTH VIEW ===== */}
      {view==="month" && (
        <div>
          <div className="grid grid-cols-7 gap-1 mb-1">
            {TH_D.map((wd,i)=><div key={i} className="text-center text-[10px] font-semibold py-1" style={{color:T.muted}}>{wd}</div>)}
          </div>
          <div className="grid grid-cols-7 gap-1">
            {monthCells.map((cell,i)=>{
              if(!cell) return <div key={i} className="aspect-square"/>;
              const k=dkey(cell); const on=k===sel; const isToday=k===dkey(new Date()); const n=countOn(k);
              return (
                <button key={i} onClick={()=>{ setSel(k); setView("day"); }}
                  className="aspect-square rounded-lg flex flex-col items-center justify-center gap-0.5 transition active:scale-95"
                  style={{background:on?T.purple:T.surf, border:`1px solid ${on?T.purple:isToday?hex(T.gold,.6):T.border}`}}>
                  <span className="text-xs font-bold" style={{color:on?"#fff":isToday?T.gold:T.text}}>{cell.getDate()}</span>
                  {n>0 && <span className="text-[8px] font-bold px-1 rounded-full" style={{background:on?"rgba(255,255,255,.25)":hex(T.purple,.2), color:on?"#fff":T.purple}}>{n}</span>}
                </button>
              );
            })}
          </div>
          <div className="text-[10px] text-center mt-3" style={{color:T.muted}}>แตะวันเพื่อดูรายละเอียด · ตัวเลข = จำนวน event วันนั้น</div>
        </div>
      )}

      {/* ===== DAY VIEW ===== */}
      {view==="day" && (
        <div className="space-y-2">
          {dayEvents.length===0 ? <Empty text="วันนี้ว่าง — เพิ่ม Event หรือพักก็ได้"/> : dayEvents.map(EventRow)}
        </div>
      )}

      {/* ===== WEEK VIEW ===== (agenda แยกตามวัน — อ่านง่ายกว่ายัด grid บนจอเล็ก) */}
      {view==="week" && (
        <div className="space-y-3">
          {week.map(wd=>{ const k=dkey(wd); const evs=events.filter(e=>e.date===k).sort((a,b)=>toMin(a.startTime)-toMin(b.startTime)); const on=k===sel;
            return (
              <div key={k}>
                <button onClick={()=>{ setSel(k); setView("day"); }} className="flex items-center gap-2 mb-1.5 w-full text-left">
                  <span className="text-xs font-bold" style={{color:on?T.purple:T.sub}}>{TH_D[wd.getDay()]} {wd.getDate()} {TH_M[wd.getMonth()]}</span>
                  <span className="h-px flex-1" style={{background:T.border}}/>
                  <span className="text-[10px]" style={{color:T.muted}}>{evs.length?`${evs.length} รายการ`:"ว่าง"}</span>
                </button>
                {evs.length>0 && <div className="space-y-2">{evs.map(EventRow)}</div>}
              </div>
            );
          })}
        </div>
      )}

      {open && <EventModal mode="add" onClose={()=>setOpen(false)} onSave={onAdd}/>}
      {editEv && <EventModal mode="edit" initial={editEv} onClose={()=>setEditEv(null)} onSave={onEdit}/>}
      {convEvent && <EventQuestModal ev={convEvent} onClose={()=>setConvEvent(null)} onCreate={(list)=>{ list.forEach(q=>addQuest(q)); setConvEvent(null); }}/>}
    </div>
  );
}

function EventModal({onClose,onSave,mode="add",initial=null}){
  const [f,setF]=useState(initial
    ? { title:initial.title||"", type:initial.type||"work", startTime:initial.startTime||"09:00", endTime:initial.endTime||"10:00", location:initial.location||"", energyCost:initial.energyCost??2, income:initial.income||"", fitKind:initial.fitKind||"weight", fitParts:initial.fitParts||[] }
    : { title:"", type:"work", startTime:"09:00", endTime:"10:00", location:"", energyCost:2, income:"", fitKind:"weight", fitParts:[] });
  const isEdit=mode==="edit";
  const togglerPart=(p)=>setF(s=>({ ...s, fitParts: s.fitParts.includes(p) ? s.fitParts.filter(x=>x!==p) : [...s.fitParts, p] }));
  return (
    <Sheet onClose={onClose} title={isEdit?"แก้ไข Event":"เพิ่ม Event"}>
      <Input label="ชื่อ" value={f.title} onChange={v=>setF({...f,title:v})} placeholder="เช่น สอนกลอง"/>
      <div className="mb-3"><Label>ประเภท</Label>
        <div className="flex gap-1.5 flex-wrap">{Object.entries(EVENT_TYPES).map(([k,v])=>{ const on=f.type===k;
          return <button key={k} onClick={()=>setF({...f,type:k})} className="flex items-center gap-1 px-2.5 py-1.5 rounded-lg text-xs font-medium" style={{background:on?v.color:T.surf2,color:on?"#000":T.sub,border:`1px solid ${on?v.color:T.border}`}}><v.Icon size={12}/>{v.label}</button>;
        })}</div>
      </div>
      {f.type==="fitness" && (
        <div className="mb-3 p-3 rounded-xl" style={{background:T.surf2, border:`1px solid ${hex(T.green,.4)}`}}>
          <Label>ประเภทการออกกำลัง</Label>
          <div className="flex gap-1.5 mb-2">
            {FIT_KINDS.map(([k,l])=>{ const on=f.fitKind===k;
              return <button key={k} onClick={()=>setF({...f,fitKind:k})} className="flex-1 py-2 rounded-lg text-xs font-bold" style={{background:on?T.green:"transparent", color:on?"#000":T.sub, border:`1px solid ${on?T.green:T.border}`}}>{l}</button>;
            })}
          </div>
          {f.fitKind==="weight" && (
            <div>
              <Label>ส่วนที่เล่น (เลือกได้หลายส่วน)</Label>
              <div className="flex gap-1.5 flex-wrap">
                {MUSCLE_PARTS.map(p=>{ const on=f.fitParts.includes(p);
                  return <button key={p} onClick={()=>togglerPart(p)} className="px-2.5 py-1.5 rounded-lg text-xs font-medium" style={{background:on?T.green:T.surf,color:on?"#000":T.sub,border:`1px solid ${on?T.green:T.border}`}}>{on?"✓ ":""}{p}</button>;
                })}
              </div>
            </div>
          )}
        </div>
      )}
      <div className="flex gap-2 mb-3">
        <div className="flex-1"><Label>เริ่ม</Label><TimeInput value={f.startTime} onChange={v=>setF({...f,startTime:v})}/></div>
        <div className="flex-1"><Label>จบ</Label><TimeInput value={f.endTime} onChange={v=>setF({...f,endTime:v})}/></div>
      </div>
      <Input label="สถานที่ (optional)" value={f.location} onChange={v=>setF({...f,location:v})} placeholder="เช่น สตูดิโอ"/>
      <Input label="รายรับ ฿ (optional)" value={f.income} onChange={v=>setF({...f,income:v})} placeholder="0" type="number"/>
      <SaveBtn disabled={!f.title.trim()} onClick={()=>{ const out={...f, income:Number(f.income)||0}; if(out.type!=="fitness"){ delete out.fitKind; delete out.fitParts; } else if(out.fitKind!=="weight"){ out.fitParts=[]; } onSave(out); }}>{isEdit?"บันทึกการแก้ไข":"เพิ่ม Event"}</SaveBtn>
      {isEdit && <div className="text-[10px] text-center mt-2" style={{color:T.muted}}>แก้แล้วอย่าลืมกด “เพิ่มลงปฏิทิน” อีกครั้งถ้าต้องการอัปเดตแจ้งเตือนในเครื่อง</div>}
    </Sheet>
  );
}

/* ── แปลง Event → Quest (Prep / Main / Follow-up) ── */
function EventQuestModal({ ev, onClose, onCreate }){
  const ET = EVENT_TYPES[ev.type];
  const fType = FOLLOW_QTYPE[ev.type] || "admin";
  const [rows,setRows]=useState({
    prep:  { on:true,  title:`${PREP_BY_TYPE[ev.type]||"เตรียมตัว"} · ${ev.title}`,  type:"tiny",  difficulty:"Easy" },
    main:  { on:true,  title:ev.title,                                               type:"main",  difficulty:"Normal" },
    follow:{ on:false, title:`${FOLLOW_BY_TYPE[ev.type]||"สรุป + เก็บงาน"} · ${ev.title}`, type:fType, difficulty:"Easy" },
  });
  const set=(k,patch)=>setRows(r=>({ ...r, [k]:{ ...r[k], ...patch } }));
  const create=()=>{
    const out=Object.values(rows).filter(r=>r.on && r.title.trim())
      .map(r=>({ title:r.title.trim(), type:r.type, difficulty:r.difficulty, date:ev.date, linkedEventId:ev.id }));
    onCreate(out);
  };
  const labels={ prep:"Prep · เตรียมก่อน", main:"Main · ตัวงานเอง", follow:"Follow-up · ตามหลัง" };
  const anyOn=Object.values(rows).some(r=>r.on);
  return (
    <Sheet onClose={onClose} title="แปลงเป็น Quest">
      <div className="flex items-center gap-2 mb-3 text-xs" style={{color:T.sub}}><ET.Icon size={13} style={{color:ET.color}}/><span className="font-semibold truncate">{ev.title}</span><span style={{color:T.muted}}>· {ev.startTime}–{ev.endTime}</span></div>
      {Object.entries(rows).map(([k,r])=>(
        <div key={k} className="mb-3 p-3 rounded-xl" style={{background:T.surf2, border:`1px solid ${r.on?hex(QUEST_TYPES[r.type].color,.5):T.border}`}}>
          <button onClick={()=>set(k,{on:!r.on})} className="flex items-center gap-2 mb-2 w-full">
            <span className="w-5 h-5 rounded-md flex items-center justify-center shrink-0" style={{background:r.on?QUEST_TYPES[r.type].color:"transparent",border:`2px solid ${r.on?QUEST_TYPES[r.type].color:T.border}`}}>{r.on && <Check size={13} color="#000"/>}</span>
            <span className="text-[11px] font-bold" style={{color:r.on?QUEST_TYPES[r.type].color:T.muted}}>{labels[k]}</span>
            <span className="text-[10px] ml-auto" style={{color:T.muted}}>{r.difficulty} · +{DIFF[r.difficulty]+(r.type==="main"?20:0)} EXP</span>
          </button>
          {r.on && <input value={r.title} onChange={e=>set(k,{title:e.target.value})} className="w-full px-3 py-2 rounded-lg text-sm outline-none" style={{background:T.surf,color:T.text,border:`1px solid ${T.border}`}}/>}
        </div>
      ))}
      <SaveBtn disabled={!anyOn} onClick={create}>สร้างเควสต์ที่เลือก</SaveBtn>
      <div className="text-[10px] text-center mt-2" style={{color:T.muted}}>เควสต์จะผูกกับ event นี้ (linkedEventId) และอยู่ในวันเดียวกัน</div>
    </Sheet>
  );
}

/* ════════════════ QUESTS ════════════════ */
function Quests(props){
  const { todayQuests, toggleQuest, delQuest, addQuest, questTemplates, saveTemplate, delTemplate, applyTemplate } = props;
  const [open,setOpen]=useState(false);
  const [tplOpen,setTplOpen]=useState(false);
  const [delTpl,setDelTpl]=useState(null);
  return (
    <div className="px-4 pt-5 space-y-4">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-extrabold">Quest Deck</h1>
        <button onClick={()=>setOpen(true)} className="px-3 py-2 rounded-xl text-sm font-bold flex items-center gap-1 active:scale-95" style={{background:T.blue,color:"#000"}}><Plus size={15}/> Custom</button>
      </div>

      {/* Templates */}
      <Section title="Templates" icon={Wand2} dot={T.violet}>
        <div className="space-y-2">
          {questTemplates.length===0
            ? <div className="text-[11px]" style={{color:T.muted}}>ยังไม่มีเทมเพลต — จัดเควสต์วันนี้ตามใจ แล้วกด “บันทึกเป็นเทมเพลต” ไว้ใช้ซ้ำวันหลัง</div>
            : questTemplates.map(tpl=>(
              <Glass key={tpl.id} className="p-3 flex items-center gap-2">
                <div className="flex-1 min-w-0">
                  <div className="font-bold text-sm truncate">{tpl.name}</div>
                  <div className="text-[10px]" style={{color:T.muted}}>{tpl.items.length} เควสต์ · {tpl.items.map(i=>i.title).slice(0,3).join(", ")}{tpl.items.length>3?"…":""}</div>
                </div>
                <button onClick={()=>applyTemplate(tpl)} className="text-xs font-bold px-3 py-1.5 rounded-lg shrink-0 active:scale-95" style={{background:T.violet,color:"#fff"}}>ใช้</button>
                {delTpl===tpl.id ? (
                  <button onClick={()=>{ delTemplate(tpl.id); setDelTpl(null); }} className="text-[10px] font-bold px-2 py-1.5 rounded-lg shrink-0" style={{background:T.red,color:"#fff"}}>ลบ?</button>
                ) : (
                  <button onClick={()=>setDelTpl(tpl.id)} aria-label="ลบเทมเพลต" className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0" style={{color:T.muted}}><Trash2 size={14}/></button>
                )}
              </Glass>
            ))}
          <button onClick={()=>setTplOpen(true)} disabled={todayQuests.length===0} className="w-full py-2.5 rounded-xl text-xs font-bold flex items-center justify-center gap-1.5" style={{background:todayQuests.length? hex(T.violet,.16):T.surf2, color:todayQuests.length?T.violet:T.muted, border:`1px dashed ${todayQuests.length?hex(T.violet,.5):T.border}`}}>
            <Plus size={14}/> บันทึกเควสต์วันนี้เป็นเทมเพลต {todayQuests.length? `(${todayQuests.length})`:""}
          </button>
        </div>
      </Section>

      <Section title={`Today (${todayQuests.length})`} icon={Swords}>
        <div className="space-y-2">{todayQuests.length===0?<Empty text="ยังไม่มีเควสต์วันนี้ — กดใช้เทมเพลต หรือเพิ่มจากเด็คด้านล่าง"/>:todayQuests.map(q=><QuestRow key={q.id} q={q} onToggle={toggleQuest} onDelete={delQuest}/>)}</div>
      </Section>

      {Object.entries(DECKS).map(([deck,items])=>{
        const c=QUEST_TYPES[DECK_QTYPE[deck]].color;
        return (
          <Section key={deck} title={deck} dot={c}>
            <div className="grid grid-cols-1 gap-2">
              {items.map((title,i)=>(
                <Glass key={i} className="p-3 flex items-center gap-3">
                  <span className="flex-1 text-sm">{title}</span>
                  <Pill color={c}>{DECK_DIFF[deck]}</Pill>
                  <button onClick={()=>addQuest({ title, type:DECK_QTYPE[deck], difficulty:DECK_DIFF[deck] })} className="w-8 h-8 rounded-lg flex items-center justify-center active:scale-90 shrink-0" style={{background:hex(c,.18),color:c}}><Plus size={16}/></button>
                </Glass>
              ))}
            </div>
          </Section>
        );
      })}
      {open && <QuestModal onClose={()=>setOpen(false)} onSave={(q)=>{addQuest(q);setOpen(false);}}/>}
      {tplOpen && <TemplateNameModal count={todayQuests.length} onClose={()=>setTplOpen(false)} onSave={(name)=>{ saveTemplate(name, todayQuests.map(q=>({ title:q.title, type:q.type, difficulty:q.difficulty }))); setTplOpen(false); }}/>}
    </div>
  );
}
function TemplateNameModal({count,onClose,onSave}){

  return (
    <Sheet onClose={onClose} title="บันทึกเป็นเทมเพลต">
      <div className="text-xs mb-3" style={{color:T.sub}}>บันทึก {count} เควสต์ของวันนี้ไว้ใช้ซ้ำ — วันหลังกด “ใช้” แล้วเควสต์จะขึ้นทั้งชุด แก้เพิ่ม-ลดทีหลังได้</div>
      <Input label="ชื่อเทมเพลต" value={name} onChange={setName} placeholder="เช่น วันสอน, วันซ้อม, วันพัก"/>

function QuestModal({onClose,onSave}){
  const [f,setF]=useState({ title:"", type:"growth", difficulty:"Normal" });
  return (
    <Sheet onClose={onClose} title="Custom Quest">
      <Input label="ชื่อเควสต์" value={f.title} onChange={v=>setF({...f,title:v})} placeholder="เช่น แกะเพลงใหม่"/>
      <div className="mb-3"><Label>ประเภท</Label><div className="flex gap-1.5 flex-wrap">{Object.entries(QUEST_TYPES).map(([k,v])=>{const on=f.type===k;return <button key={k} onClick={()=>setF({...f,type:k})} className="px-2.5 py-1.5 rounded-lg text-xs font-medium" style={{background:on?v.color:T.surf2,color:on?"#000":T.sub,border:`1px solid ${on?v.color:T.border}`}}>{v.label}</button>;})}</div></div>
      <div className="mb-3"><Label>ความยาก</Label><div className="flex gap-1.5">{Object.entries(DIFF).map(([k,e])=>{const on=f.difficulty===k;return <button key={k} onClick={()=>setF({...f,difficulty:k})} className="flex-1 py-2 rounded-lg text-xs font-bold" style={{background:on?T.purple:T.surf2,color:on?"#fff":T.sub}}>{k}<div className="text-[9px] opacity-70">{e} EXP</div></button>;})}</div></div>
      <SaveBtn disabled={!f.title.trim()} onClick={()=>onSave(f)}>เพิ่มเควสต์</SaveBtn>
    </Sheet>
  );
}

/* ════════════════ STUDIO ════════════════ */
const PER_PAGE = 10;
const monthKey = (dk)=> (dk||"").slice(0,7);
const addMonthKey = (mk, delta)=>{ const [y,m]=mk.split("-").map(Number); const d=new Date(y, m-1+delta, 1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; };
const monthLabel = (mk)=>{ const [y,m]=mk.split("-").map(Number); return `${TH_M[m-1]} ${y}`; };
const fmtBaht = (n)=>`฿${Math.round(n).toLocaleString()}`;
const shortDate = (dk)=>{ const d=parseK(dk); return `${d.getDate()} ${TH_M[d.getMonth()]}`; };
const openMaps = (loc)=>{ if(!loc) return; window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc)}`, "_blank", "noopener"); };

const Pager = ({page,setPage,total})=>{
  const pages=Math.max(1,Math.ceil(total/PER_PAGE));
  if(pages<=1) return null;
  return (
    <div className="flex items-center justify-between pt-1">
      <button disabled={page<=0} onClick={()=>setPage(p=>Math.max(0,p-1))} className="text-[11px] font-semibold px-2.5 py-1.5 rounded-lg flex items-center gap-1" style={{background:T.surf2, color:page<=0?T.muted:T.text, opacity:page<=0?0.4:1}}><ChevronLeft size={13}/> ก่อนหน้า</button>
      <span className="text-[11px]" style={{color:T.muted}}>หน้า {page+1}/{pages}</span>
      <button disabled={page>=pages-1} onClick={()=>setPage(p=>Math.min(pages-1,p+1))} className="text-[11px] font-semibold px-2.5 py-1.5 rounded-lg flex items-center gap-1" style={{background:T.surf2, color:page>=pages-1?T.muted:T.text, opacity:page>=pages-1?0.4:1}}>ถัดไป <ChevronRight size={13}/></button>
    </div>
  );
};

function Collapse({title,icon:Icon,count,color,children,defaultOpen}){
  const [open,setOpen]=useState(!!defaultOpen);
  const c=color||T.purple;
  return (
    <div>
      <button onClick={()=>setOpen(o=>!o)} className="w-full flex items-center gap-2 p-3 rounded-xl active:scale-[.99]" style={{background:T.surf, border:`1px solid ${open?hex(c,.5):T.border}`}}>
        {Icon && <Icon size={16} style={{color:c}}/>}
        <span className="font-bold text-sm">{title}</span>
        <span className="text-[11px] font-bold px-2 py-0.5 rounded-full" style={{background:hex(c,.16), color:c}}>{count}</span>
        <ChevronDown size={16} style={{color:T.muted, marginLeft:"auto", transform:open?"rotate(180deg)":"none", transition:"transform .2s"}}/>
      </button>
      {open && <div className="mt-2 space-y-2">{children}</div>}
    </div>
  );
}

function Studio(props){
  const { bookings, addBooking, loyaltyBase, resetLoyalty, togglePaid, toggleBookingDone, delBooking, delBand,
    transactions, addTxn, delTxn, capital, updateCapital } = props;
  const [open,setOpen]=useState(false);       // booking modal
  const [txnOpen,setTxnOpen]=useState(false);  // expense/txn modal
  const [histBand,setHistBand]=useState(null);
  const [capEdit,setCapEdit]=useState(false);
  const [capVal,setCapVal]=useState(String(capital));
  useEffect(()=>{ setCapVal(String(capital)); },[capital]);

  // finance scope
  const [finMode,setFinMode]=useState("total"); // total | month
  const [finMonth,setFinMonth]=useState(monthKey(TK));
  const inScope = (dk)=> finMode==="total" ? true : monthKey(dk)===finMonth;

  // pagination
  const [bandPage,setBandPage]=useState(0);
  const [bookPage,setBookPage]=useState(0);
  const [txnPage,setTxnPage]=useState(0);

  // confirm-delete states
  const [delBandC,setDelBandC]=useState(null);
  const [delBookC,setDelBookC]=useState(null);

  // ── finance numbers ──
  const incomeBookings = bookings.filter(b=>b.paid && inScope(b.date)).reduce((s,b)=>s+b.totalPrice,0);
  const txnIn  = transactions.filter(t=>t.kind==="in"  && inScope(t.date)).reduce((s,t)=>s+Number(t.amount||0),0);
  const txnOut = transactions.filter(t=>t.kind==="out" && inScope(t.date)).reduce((s,t)=>s+Number(t.amount||0),0);
  const income = incomeBookings + txnIn;
  const expense = txnOut;
  const net = income - expense;
  const allNet = bookings.filter(b=>b.paid).reduce((s,b)=>s+b.totalPrice,0)
    + transactions.reduce((s,t)=>s+(t.kind==="in"?1:-1)*Number(t.amount||0),0);
  const balance = capital + allNet;

  const payInfo=(b)=> b.paid ? { label:"จ่ายครบ", color:T.green }
    : (b.deposit>0 ? { label:`มัดจำ ฿${b.deposit.toLocaleString()} · ค้าง ฿${(b.totalPrice-b.deposit).toLocaleString()}`, color:T.orange }
        : { label:"ยังไม่จ่าย", color:T.red });

  // ── bands (loyalty) ──
  const groups = useMemo(()=>{
    const m={}; bookings.forEach(b=>{ (m[b.bandName] ??= []).push(b); });
    return Object.entries(m).map(([band,list])=>{
      const allHours = list.reduce((s,b)=>s+hoursBetween(b.startTime,b.endTime),0);
      const paidHours = list.filter(b=>b.paid).reduce((s,b)=>s+hoursBetween(b.startTime,b.endTime),0);
      const base = loyaltyBase[band]||0;
      const tally = Math.max(0, paidHours-base);
      const sortedList=[...list].sort((a,b)=>b.date.localeCompare(a.date));
      return { band, list:sortedList, lastDate:sortedList[0]?.date,
        allHours, paidHours, tally, free:Math.floor(tally/5), prog:tally%5, sessions:list.length };
    }).sort((a,b)=>b.allHours-a.allHours);
  },[bookings,loyaltyBase]);
  const histGroup = groups.find(g=>g.band===histBand);
  const bandSlice = groups.slice(bandPage*PER_PAGE,(bandPage+1)*PER_PAGE);

  // ── bookings list (active first, done+paid dimmed) ──
  const sortedBookings = useMemo(()=>[...bookings].sort((a,b)=>{
    const aDone=(a.done ?? (a.bookingStatus==="Completed"))&&a.paid, bDone=(b.done ?? (b.bookingStatus==="Completed"))&&b.paid;
    if(aDone!==bDone) return aDone?1:-1;         // archive ไปท้าย
    return b.date.localeCompare(a.date);
  }),[bookings]);
  const bookSlice = sortedBookings.slice(bookPage*PER_PAGE,(bookPage+1)*PER_PAGE);

  // ── transactions list ──
  const sortedTxns = useMemo(()=>[...transactions].sort((a,b)=>b.date.localeCompare(a.date)),[transactions]);
  const txnSlice = sortedTxns.slice(txnPage*PER_PAGE,(txnPage+1)*PER_PAGE);

  const netColor = net>=0?T.green:T.red;

  return (
    <div className="px-4 pt-5 space-y-4">
      <h1 className="text-2xl font-extrabold">Studio</h1>

      {/* ── การเงิน ── */}
      <Glass className="p-4" glowColor={T.purple}>
        <div className="flex items-center gap-1 p-1 rounded-xl mb-3" style={{background:T.surf2}}>
          {[["total","รวมทั้งหมด"],["month","รายเดือน"]].map(([k,l])=>{ const on=finMode===k;
            return <button key={k} onClick={()=>setFinMode(k)} className="flex-1 py-1.5 rounded-lg text-xs font-bold" style={{background:on?T.purple:"transparent", color:on?"#fff":T.sub}}>{l}</button>;
          })}
        </div>
        {finMode==="month" && (
          <div className="flex items-center justify-between mb-3">
            <button onClick={()=>setFinMonth(m=>addMonthKey(m,-1))} className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:T.surf2}}><ChevronLeft size={16}/></button>
            <span className="text-sm font-bold">{monthLabel(finMonth)}</span>
            <button onClick={()=>setFinMonth(m=>addMonthKey(m,1))} className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:T.surf2}}><ChevronRight size={16}/></button>
          </div>
        )}
        <div className="grid grid-cols-3 gap-2">
          <div><div className="text-[10px]" style={{color:T.muted}}>รายรับ</div><div className="text-base font-extrabold flex items-center gap-1" style={{color:T.green}}><TrendingUp size={13}/>{fmtBaht(income)}</div></div>
          <div><div className="text-[10px]" style={{color:T.muted}}>รายจ่าย</div><div className="text-base font-extrabold flex items-center gap-1" style={{color:T.red}}><TrendingDown size={13}/>{fmtBaht(expense)}</div></div>
          <div><div className="text-[10px]" style={{color:T.muted}}>สุทธิ</div><div className="text-base font-extrabold" style={{color:netColor}}>{net>=0?"":"-"}{fmtBaht(Math.abs(net))}</div></div>
        </div>
        <div className="mt-3 pt-3 flex items-center justify-between" style={{borderTop:`1px solid ${T.border}`}}>
          <div className="flex items-center gap-2">
            <Wallet size={14} style={{color:T.gold}}/>
            <span className="text-[11px]" style={{color:T.sub}}>เงินต้น</span>
            {capEdit ? (
              <input autoFocus type="number" value={capVal} onChange={e=>setCapVal(e.target.value)}
                onBlur={()=>{ updateCapital(capVal); setCapEdit(false); }}
                onKeyDown={e=>{ if(e.key==="Enter"){ updateCapital(capVal); setCapEdit(false); } }}
                className="w-24 px-2 py-1 rounded-lg text-sm outline-none" style={{background:T.surf2, color:T.text, border:`1px solid ${T.gold}`}}/>
            ) : (
              <button onClick={()=>setCapEdit(true)} className="text-sm font-bold flex items-center gap-1" style={{color:T.text}}>{fmtBaht(capital)} <Pencil size={11} style={{color:T.muted}}/></button>
            )}
          </div>
          <div className="text-right">
            <div className="text-[10px]" style={{color:T.muted}}>ยอดคงเหลือ</div>
            <div className="text-lg font-extrabold" style={{color:balance>=0?T.gold:T.red}}>{fmtBaht(balance)}</div>
          </div>
        </div>
        {finMode==="month" && <div className="text-[10px] mt-2" style={{color:T.muted}}>* ยอดคงเหลือรวมทุกเดือน (เงินต้น + สุทธิสะสม) — ตัวเลขรายรับ/จ่าย/สุทธิด้านบนคือของเดือนที่เลือก</div>}
      </Glass>

      {/* ── ปุ่มลัด ── */}
      <div className="flex gap-2">
        <button onClick={()=>setOpen(true)} className="flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-[.98]" style={{background:T.purple,color:"#fff",boxShadow:glow(T.purple)}}><Plus size={17}/> จองห้อง</button>
        <button onClick={()=>setTxnOpen(true)} className="flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-[.98]" style={{background:T.surf2, color:T.red, border:`1px solid ${hex(T.red,.5)}`}}><TrendingDown size={17}/> รายจ่าย</button>
      </div>

      {/* ── วง & ชั่วโมงสะสม ── */}
      <Collapse title="วง & ชั่วโมงสะสม" icon={Gift} count={groups.length} color={T.gold} defaultOpen>
        {groups.length===0 ? <Empty text="ยังไม่มีวง — เริ่มจากจองห้อง"/> : bandSlice.map(g=>(
          <Glass key={g.band} className="p-3" glowColor={g.free>0?T.gold:undefined}>
            <div className="flex items-center gap-2">
              <button onClick={()=>setHistBand(g.band)} className="flex items-center gap-2 min-w-0 flex-1">
                <Speaker size={15} style={{color:T.purple}}/>
                <span className="font-bold truncate">{g.band}</span>
                <ChevronRight size={13} style={{color:T.muted}}/>
              </button>
              {g.free>0 && <Pill color={T.gold} solid><Gift size={11}/> ฟรี {g.free}</Pill>}
              <button onClick={()=>resetLoyalty(g.band, g.paidHours)} aria-label="รีเซ็ตสะสม" className="w-7 h-7 rounded-lg flex items-center justify-center shrink-0" style={{color:T.cyan}}><RotateCcw size={13}/></button>
              {delBandC===g.band ? (
                <button onClick={()=>{ delBand(g.band); setDelBandC(null); setBandPage(0); }} className="text-[10px] font-bold px-2 py-1 rounded-lg shrink-0" style={{background:T.red,color:"#fff"}}>ลบวง?</button>
              ) : (
                <button onClick={()=>setDelBandC(g.band)} aria-label="ลบวง" className="w-7 h-7 rounded-lg flex items-center justify-center shrink-0" style={{color:T.muted}}><Trash2 size={13}/></button>
              )}
            </div>
            <div className="mt-2.5">
              <div className="flex justify-between text-[10px] mb-1">
                <span style={{color:T.sub}}>สะสม {g.tally} ชม.</span>
                <span style={{color:T.muted}}>{g.prog}/5 → อีก {5-g.prog} ฟรี 1</span>
              </div>
              <div className="flex gap-1">
                {Array.from({length:5}).map((_,i)=><div key={i} className="flex-1 h-2 rounded-full" style={{background:i<g.prog?T.gold:T.surf2, boxShadow:i<g.prog?`0 0 6px ${hex(T.gold,.5)}`:"none"}}/>)}
              </div>
            </div>
            <div className="flex items-center justify-between mt-2 text-[10px]" style={{color:T.muted}}>
              <span>{g.sessions} ครั้ง · จ่ายครบ {g.paidHours}/{g.allHours} ชม.</span>
              {g.lastDate && <span>ล่าสุด {shortDate(g.lastDate)}</span>}
            </div>
          </Glass>
        ))}
        <Pager page={bandPage} setPage={setBandPage} total={groups.length}/>
      </Collapse>

      {/* ── การจอง ── */}
      <Collapse title="การจอง" icon={History} count={bookings.length} color={T.blue}>
        {bookings.length===0 ? <Empty text="ยังไม่มีการจอง"/> : bookSlice.map(b=>{
          const dt=parseK(b.date); const future=b.date>TK; const isToday=b.date===TK; const pi=payInfo(b);
          const bkDone=b.done ?? (b.bookingStatus==="Completed");
          const archived=bkDone&&b.paid;
          return (
            <Glass key={b.id} className="p-3" style={{opacity:archived?0.55:1}} glowColor={!b.paid&&!future?T.orange:undefined}>
              <div className="flex items-center gap-2.5">
                {/* date column */}
                <div className="w-11 text-center shrink-0">
                  <div className="text-[9px]" style={{color:T.muted}}>{TH_D[dt.getDay()]}</div>
                  <div className="text-base font-bold leading-none" style={{color:isToday?T.green:T.text}}>{dt.getDate()}</div>
                  <div className="text-[9px]" style={{color:T.muted}}>{TH_M[dt.getMonth()]}</div>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-1.5">
                    <span className="font-bold text-sm truncate">{b.bandName}</span>
                    {future && <Pill color={T.blue}>จะถึง</Pill>}
                  </div>
                  <div className="text-[10px] mt-0.5" style={{color:T.muted}}>{b.startTime}–{b.endTime} · {hoursBetween(b.startTime,b.endTime)}h · <span style={{color:pi.color}}>{pi.label}</span></div>
                </div>
                <span className="text-base font-extrabold shrink-0" style={{color:T.gold}}>฿{b.totalPrice.toLocaleString()}</span>
              </div>
              <div className="flex items-center gap-1.5 mt-2.5 pt-2.5" style={{borderTop:`1px solid ${T.border}`}}>
                <button onClick={()=>toggleBookingDone(b.id)} className="flex items-center gap-1.5 flex-1 justify-center py-1.5 rounded-lg text-[11px] font-semibold" style={{background:bkDone?hex(T.green,.16):T.surf2, color:bkDone?T.green:T.sub}}>
                  <span className="w-4 h-4 rounded flex items-center justify-center" style={{background:bkDone?T.green:"transparent",border:`1.5px solid ${bkDone?T.green:T.border}`}}>{bkDone&&<Check size={11} color="#000"/>}</span>สำเร็จ
                </button>
                <button onClick={()=>togglePaid(b.id)} className="flex items-center gap-1.5 flex-1 justify-center py-1.5 rounded-lg text-[11px] font-semibold" style={{background:b.paid?hex(T.green,.16):T.surf2, color:b.paid?T.green:T.sub}}>
