/* ════════════════ BUDGET (รายรับรวม + ค้างจ่าย) ════════════════ */
function Budget(props){
  const { events, bookings, transactions, toggleEventPaid, togglePaid, markBookingPaid, editEvent } = props;
  const [mode,setMode]=useState("total"); // total | month
  const [mk,setMk]=useState(monthKey(TK));
  const [showDue,setShowDue]=useState(true);
  const [showRcv,setShowRcv]=useState(false);
  const [recvItem,setRecvItem]=useState(null); // event ที่กำลังยืนยันรับเงิน
  const [editRecv,setEditRecv]=useState(null); // รายการรับแล้วที่กำลังแก้
  const [rcvPage,setRcvPage]=useState(0);
  const inScope=(dk)=> mode==="total" ? true : monthKey(dk)===mk;

  // รวมรายรับจากทุกแหล่ง (กัน studio event ซ้ำกับ booking โดยตัด type studio ออก)
  const items = useMemo(()=>{
    const evs = events.filter(e=>Number(e.income)>0 && e.type!=="studio")
      .map(e=>({ key:"e"+e.id, kind:"event", id:e.id, date:e.date, title:e.title, amount:Number(e.income), tip:Number(e.tip)||0, method:e.payMethod||null, tipMethod:e.tipMethod||e.payMethod||null, paid:!!e.paid }));
    const bks = bookings.filter(b=>Number(b.totalPrice)>0)
      .map(b=>({ key:"b"+b.id, kind:"booking", id:b.id, date:b.date, title:"ห้องซ้อม: "+b.bandName, amount:b.totalPrice, tip:0, method:b.payMethod||null, tipMethod:null, paid:!!b.paid }));
    const txs = transactions.filter(t=>t.kind==="in")
      .map(t=>({ key:"t"+t.id, kind:"txn", id:t.id, date:t.date, title:t.title, amount:Number(t.amount||0), tip:0, method:null, paid:true }));
    return [...evs,...bks,...txs];
  },[events,bookings,transactions]);

  const scoped = items.filter(i=>inScope(i.date));
  const received = scoped.filter(i=>i.paid);
  const due = items.filter(i=>!i.paid).sort((a,b)=>a.date.localeCompare(b.date)); // ค้างทั้งหมด (ไม่อิง scope)
  const receivedSum = received.reduce((s,i)=>s+i.amount+i.tip,0);
  const dueSum = due.reduce((s,i)=>s+i.amount,0);
  const sumKind=(k)=>received.filter(i=>i.kind===k).reduce((s,i)=>s+i.amount,0);
  const tipsSum=received.reduce((s,i)=>s+i.tip,0);
  const rcvSorted = [...received].sort((a,b)=>b.date.localeCompare(a.date));
  const rcvSlice = rcvSorted.slice(rcvPage*PER_PAGE,(rcvPage+1)*PER_PAGE);

  const [payBk,setPayBk]=useState(null); // booking ที่กำลังเลือกช่องทาง
  const tickDue=(it)=>{ if(it.kind==="event") setRecvItem(it); else if(it.kind==="booking") setPayBk(it); };
  const srcTag=(k)=> k==="event"?{t:"งาน/Event",c:T.purple} : k==="booking"?{t:"ห้องซ้อม",c:T.blue} : {t:"รายรับอื่น",c:T.cyan};
  const methodTag=(m)=> m==="cash" ? {t:"เงินสด",c:T.gold} : m==="transfer" ? {t:"โอน",c:T.cyan} : null;

  return (
    <div className="px-4 pt-5 space-y-4">
      <h1 className="text-2xl font-extrabold">Budget</h1>

      {/* สรุปรายรับ */}
      <Glass className="p-4" glowColor={T.green}>
        <div className="flex items-center gap-1 p-1 rounded-xl mb-3" style={{background:T.surf2}}>
          {[["total","รวมทั้งหมด"],["month","รายเดือน"]].map(([k,l])=>{ const on=mode===k;
            return <button key={k} onClick={()=>setMode(k)} className="flex-1 py-1.5 rounded-lg text-xs font-bold" style={{background:on?T.green:"transparent", color:on?"#000":T.sub}}>{l}</button>;
          })}
        </div>
        {mode==="month" && (
          <div className="flex items-center justify-between mb-3">
            <button onClick={()=>setMk(m=>addMonthKey(m,-1))} className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:T.surf2}}><ChevronLeft size={16}/></button>
            <span className="text-sm font-bold">{monthLabel(mk)}</span>
            <button onClick={()=>setMk(m=>addMonthKey(m,1))} className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:T.surf2}}><ChevronRight size={16}/></button>
          </div>
        )}
        <div className="flex items-end justify-between">
          <div>
            <div className="text-[11px]" style={{color:T.muted}}>รับเงินแล้ว{mode==="month"?" (เดือนนี้)":""}</div>
            <div className="text-3xl font-extrabold flex items-center gap-1" style={{color:T.green}}><TrendingUp size={22}/>{fmtBaht(receivedSum)}</div>
          </div>
          <div className="text-right">
            <div className="text-[11px]" style={{color:T.muted}}>ค้างรับ (ทั้งหมด)</div>
            <div className="text-xl font-extrabold" style={{color:dueSum>0?T.orange:T.muted}}>{fmtBaht(dueSum)}</div>
          </div>
        </div>
        {/* breakdown แต่ละก้อน */}
        <div className="grid grid-cols-2 gap-1.5 mt-3 pt-3" style={{borderTop:`1px solid ${hex(T.border,.7)}`}}>
          {[["งาน/Event",sumKind("event"),T.purple],["ห้องซ้อม",sumKind("booking"),T.blue],["รายรับอื่น",sumKind("txn"),T.cyan],["Tips",tipsSum,T.gold]].map(([l,v,c])=>(
            <div key={l} className="flex items-center justify-between px-2.5 py-2 rounded-lg" style={{background:T.surf2}}>
              <span className="text-[10px] font-semibold" style={{color:T.sub}}>{l}</span>
              <span className="text-xs font-extrabold" style={{color:v>0?c:T.muted}}>฿{Number(v).toLocaleString()}</span>
            </div>
          ))}
        </div>
        {(()=>{ const by=(m)=>received.reduce((s,i)=>s+(i.method===m?i.amount:0)+(i.tipMethod===m?i.tip:0),0);
          const tr=by("transfer"), ca=by("cash");
          return (tr>0||ca>0) ? (
            <div className="flex items-center justify-center gap-4 mt-2 text-[11px]">
              <span style={{color:T.cyan}}>โอน <b>฿{tr.toLocaleString()}</b></span>
              <span style={{color:T.border}}>|</span>
              <span style={{color:T.gold}}>เงินสด <b>฿{ca.toLocaleString()}</b></span>
            </div>
          ) : null;
        })()}
      </Glass>

      {/* ปุ่มค้างจ่าย */}
      <button onClick={()=>setShowDue(s=>!s)} className="w-full flex items-center gap-2 p-3 rounded-xl active:scale-[.99]" style={{background:T.surf, border:`1px solid ${due.length?hex(T.orange,.5):T.border}`}}>
        <AlertCircle size={16} style={{color:due.length?T.orange:T.muted}}/>
        <span className="font-bold text-sm">รายการค้างจ่าย</span>
        <span className="text-[11px] font-bold px-2 py-0.5 rounded-full" style={{background:hex(T.orange,.16), color:T.orange}}>{due.length} · ฿{dueSum.toLocaleString()}</span>
        <ChevronDown size={16} style={{color:T.muted, marginLeft:"auto", transform:showDue?"rotate(180deg)":"none", transition:"transform .2s"}}/>
      </button>
      {showDue && (
        <div className="space-y-2">
          {due.length===0 ? <Empty text="ไม่มีรายการค้าง — เก็บเงินครบทุกงาน 🎉"/> : due.map(it=>{ const dt=parseK(it.date); const tag=srcTag(it.kind); const overdue=it.date<TK;
            return (
              <Glass key={it.key} className="p-3 flex items-center gap-3" glowColor={overdue?T.orange:undefined}>
                <div className="w-11 text-center shrink-0">
                  <div className="text-[9px]" style={{color:T.muted}}>{TH_D[dt.getDay()]}</div>
                  <div className="text-base font-bold leading-none" style={{color:overdue?T.orange:T.text}}>{dt.getDate()}</div>
                  <div className="text-[9px]" style={{color:T.muted}}>{TH_M[dt.getMonth()]}</div>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-sm truncate">{it.title}</div>
                  <div className="flex items-center gap-1.5 mt-0.5"><span className="text-[9px] font-bold px-1.5 py-0.5 rounded-full" style={{background:hex(tag.c,.16),color:tag.c}}>{tag.t}</span>{overdue && <span className="text-[9px]" style={{color:T.orange}}>เลยกำหนด</span>}</div>
                </div>
                <span className="font-extrabold shrink-0" style={{color:T.gold}}>฿{it.amount.toLocaleString()}</span>
                {it.kind!=="txn" && (
                  <div className="flex flex-col items-center gap-0.5 shrink-0">
                    <button onClick={()=>tickDue(it)} aria-label="ติ๊กเมื่อรับเงิน" className="w-7 h-7 rounded-md flex items-center justify-center active:scale-90" style={{background:"transparent", border:`2px solid ${hex(T.green,.6)}`}}/>
                    <span className="text-[8px]" style={{color:T.muted}}>รับเงิน</span>
                  </div>
                )}
              </Glass>
            );
          })}
        </div>
      )}

      {/* รายการรับเงินแล้ว (dropdown) */}
      <div>
        <button onClick={()=>setShowRcv(s=>!s)} className="w-full flex items-center gap-2 p-3 rounded-xl active:scale-[.99]" style={{background:T.surf, border:`1px solid ${T.border}`}}>
          <Check size={15} style={{color:T.green}}/>
          <span className="font-bold text-sm">รับเงินแล้ว{mode==="month"?` · ${monthLabel(mk)}`:""}</span>
          <span className="text-[11px] font-bold px-2 py-0.5 rounded-full" style={{background:hex(T.green,.14), color:T.green}}>{received.length} · ฿{receivedSum.toLocaleString()}</span>
          <ChevronDown size={16} style={{color:T.muted, marginLeft:"auto", transform:showRcv?"rotate(180deg)":"none", transition:"transform .2s"}}/>
        </button>
        {showRcv && (
          <div className="space-y-2 mt-2">
            {received.length===0 ? <Empty text="ยังไม่มีรายรับที่รับเงินแล้ว"/> : rcvSlice.map(it=>{ const dt=parseK(it.date); const tag=srcTag(it.kind); const mt=methodTag(it.method);
              return (
                <Glass key={it.key} className="p-3 flex items-center gap-3">
                  <div className="w-11 text-center shrink-0">
                    <div className="text-[9px]" style={{color:T.muted}}>{TH_D[dt.getDay()]}</div>
                    <div className="text-base font-bold leading-none">{dt.getDate()}</div>
                    <div className="text-[9px]" style={{color:T.muted}}>{TH_M[dt.getMonth()]}</div>
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="font-semibold text-sm truncate">{it.title}</div>
                    <div className="flex items-center gap-1 mt-0.5 flex-wrap">
                      <span className="text-[9px] font-bold px-1.5 py-0.5 rounded-full" style={{background:hex(tag.c,.16),color:tag.c}}>{tag.t}</span>
                      {mt && <span className="text-[9px] font-bold px-1.5 py-0.5 rounded-full" style={{background:hex(mt.c,.16),color:mt.c}}>{mt.t}</span>}
                      {it.tip>0 && <span className="text-[9px] font-bold" style={{color:T.gold}}>Tips +฿{it.tip.toLocaleString()}{it.tipMethod && it.tipMethod!==it.method ? (it.tipMethod==="cash"?" (สด)":" (โอน)") : ""}</span>}
                    </div>
                  </div>
                  <span className="font-extrabold shrink-0" style={{color:T.green}}>+฿{(it.amount+it.tip).toLocaleString()}</span>
                  {it.kind==="event" && <button onClick={()=>setEditRecv(it)} aria-label="แก้ไขการรับเงิน" className="w-7 h-7 rounded-lg flex items-center justify-center shrink-0" style={{color:T.blue}}><Pencil size={13}/></button>}
                  {it.kind==="booking" && <button onClick={()=>togglePaid(it.id)} aria-label="ยกเลิกรับเงิน (กลับไปค้างจ่าย)" className="w-7 h-7 rounded-lg flex items-center justify-center shrink-0" style={{color:T.muted}}><RotateCcw size={13}/></button>}
                </Glass>
              );
            })}
            {received.length>0 && <Pager page={rcvPage} setPage={setRcvPage} total={received.length}/>}
          </div>
        )}
      </div>

      {payBk && <PayMethodModal title={payBk.title} sub={shortDate(payBk.date)+" · ฿"+Number(payBk.amount).toLocaleString()} onClose={()=>setPayBk(null)} onPick={(m)=>{ markBookingPaid(payBk.id, m); setPayBk(null); }}/>}
      {recvItem && <ReceiveModal item={recvItem} onClose={()=>setRecvItem(null)}
        onConfirm={(tip,method,tipMethod)=>{ editEvent(recvItem.id, { paid:true, tip:Number(tip)||0, payMethod:method, tipMethod }); setRecvItem(null); }}/>}
      {editRecv && <ReceiveModal item={editRecv} initial={{ tip:editRecv.tip, method:editRecv.method, tipMethod:editRecv.tipMethod }}
        onUnpay={()=>{ editEvent(editRecv.id, { paid:false }); setEditRecv(null); }}
        onClose={()=>setEditRecv(null)}
        onConfirm={(tip,method,tipMethod)=>{ editEvent(editRecv.id, { tip:Number(tip)||0, payMethod:method, tipMethod }); setEditRecv(null); }}/>}

      <div className="text-[10px] text-center pb-2" style={{color:T.muted}}>รวมรายรับจากงาน/Event · ห้องซ้อม · รายรับอื่น — ติ๊กช่องว่างที่รายการค้างเพื่อยืนยันรับเงิน (งาน/Event ใส่ Tips + วิธีรับได้)</div>
    </div>
  );
}

/* ════════════════ WORKOUT LOG + REST TIMER ════════════════ */
let _actx=null;
function ensureAudio(){ try{ if(!_actx) _actx=new (window.AudioContext||window.webkitAudioContext)(); if(_actx.state==="suspended") _actx.resume(); }catch{} return _actx; }
function countTick(n){
  try{ const ctx=ensureAudio(); if(ctx){ const t=ctx.currentTime;
    const o=ctx.createOscillator(), g=ctx.createGain(); o.type="sine"; o.frequency.value= n===1?1000 : n===2?800 : 620;
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.35,t+0.015); g.gain.exponentialRampToValueAtTime(0.0001,t+0.14);
    o.start(t); o.stop(t+0.15);
  }}catch{}
  try{ if(window.speechSynthesis){ const w={3:"three",2:"two",1:"one"}[n]; if(w){ window.speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(w); u.lang="en-US"; u.rate=1.15; u.volume=1; window.speechSynthesis.speak(u); } } }catch{}
  if(navigator.vibrate) navigator.vibrate(80);
}
function softTick(){ try{ const ctx=ensureAudio(); if(!ctx) return; const t0=ctx.currentTime; const o=ctx.createOscillator(),g=ctx.createGain(); o.type="sine"; o.frequency.value=880; o.connect(g); g.connect(ctx.destination); g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(0.25,t0+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t0+0.15); o.start(t0); o.stop(t0+0.16); }catch{} }
function beep(){ try{ const ctx=ensureAudio(); if(!ctx) return; const t=ctx.currentTime;
  // สัญญาณแบบไฟไหม้: สลับ 2 โทนถี่ๆ ~3 วินาที เสียงแหลมดัง
  for(let i=0;i<8;i++){ const off=i*0.38;
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type="square"; o.frequency.setValueAtTime(i%2? 750 : 1100, t+off);
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.0001,t+off); g.gain.exponentialRampToValueAtTime(0.85,t+off+0.02);
    g.gain.setValueAtTime(0.85,t+off+0.30); g.gain.exponentialRampToValueAtTime(0.0001,t+off+0.36);
    o.start(t+off); o.stop(t+off+0.37);
  }
  if(navigator.vibrate) navigator.vibrate([400,120,400,120,400,120,400,120,600]);
}catch{} }

function useRestTimer(){
  const [total,setTotal]=useState(90);
  const [left,setLeft]=useState(90);
  const [running,setRunning]=useState(false);
  const ref=React.useRef(null);
  useEffect(()=>{
    if(!running) return;
    ref.current=setInterval(()=>{ setLeft(l=>{ if(l<=1){ clearInterval(ref.current); setRunning(false); beep(); return 0; } const nl=l-1; if(nl<=3) countTick(nl); return nl; }); },1000);
    return ()=>{ if(ref.current) clearInterval(ref.current); };
  },[running]);
  const pick=(s)=>{ setTotal(s); setLeft(s); setRunning(false); };
  const start=()=>{ ensureAudio(); if(left<=0) setLeft(total); setRunning(true); };
  const pause=()=>setRunning(false);
  const adj=(d)=>{ setLeft(l=>Math.max(0,l+d)); setTotal(t=>Math.max(5,t+d)); };
  const restart=(s)=>{ ensureAudio(); const dur = typeof s==="number"?s:total; setTotal(dur); setLeft(dur); setRunning(true); };
  return { total,left,running,setRunning,pick,start,pause,adj,restart };
}

const NumBox=({value,onChange,suffix,w=54})=>(

);

function WorkoutLog({ workouts, updateWorkouts, events, exPresets, setExPresets, workoutPresets }){
  const t=useRestTimer();
  const [restOv,setRestOv]=useState(false);
  const [finOpen,setFinOpen]=useState(false);
  const startRest=(sec)=>{ t.restart(sec); setRestOv(true); };
  const skipRest=()=>{ t.pause(); setRestOv(false); };
  useEffect(()=>{ if(restOv && !t.running && t.left<=0){ const id=setTimeout(()=>setRestOv(false), 4000); return ()=>clearTimeout(id); } },[restOv,t.running,t.left]);
  const [activeId,setActiveId]=useState(null);
  const [exName,setExName]=useState("");
  const [openEx,setOpenEx]=useState({}); // exId -> bool
  const [confirmDelS,setConfirmDelS]=useState(false);

  const upsert=(sess)=>updateWorkouts(ws=>{ const i=ws.findIndex(w=>w.id===sess.id); if(i<0) return [...ws,sess]; const c=[...ws]; c[i]=sess; return c; });
  const delSession=(id)=>updateWorkouts(ws=>ws.filter(w=>w.id!==id));
  const sorted=[...workouts].sort((a,b)=>b.date.localeCompare(a.date));
  const active=workouts.find(w=>w.id===activeId);
  const [nowMs,setNowMs]=useState(Date.now());
  useEffect(()=>{ if(active && active.startedAt && !active.endedAt){ const id=setInterval(()=>setNowMs(Date.now()),1000); return ()=>clearInterval(id); } },[active&&active.startedAt, active&&active.endedAt]);
  const fmtElapsed=(ms)=>{ const s2=Math.max(0,Math.floor(ms/1000)); const h=Math.floor(s2/3600),m=Math.floor((s2%3600)/60),sec=s2%60; return h?`${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`:`${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`; };

  // ค่าครั้งก่อนของท่าเดียวกัน (session ที่เก่ากว่า)
  const lastFor=(name, curDate, curId)=>{
    const key=(name||"").trim().toLowerCase();
    const cands=workouts.filter(w=>w.id!==curId && w.date<=curDate).sort((a,b)=>b.date.localeCompare(a.date));
    for(const w of cands){ const ex=(w.exercises||[]).find(e=>(e.name||"").trim().toLowerCase()===key); if(ex) return { date:w.date, sets:ex.sets||[] }; }
    return null;
  };
  const setsSummary=(sets)=> (sets||[]).map(s=>`${s.reps||0}${s.weight?"×"+s.weight:""}`).join(", ");

  const newSession=()=>{
    const fitEv=(events||[]).find(e=>e.date===TK && e.type==="fitness");
    let title="", linkedEventId=null;
    if(fitEv){ linkedEventId=fitEv.id; title = (fitEv.fitKind==="weight" && (fitEv.fitParts||[]).length) ? fitEv.fitParts.join("+") : (fitEv.title||"").replace(/^(GYM|SPORTS|เวท|กีฬา):?\s*/,"") || fitEv.title; }
    const s={ id:uid(), date:TK, title, linkedEventId, exercises:[] }; upsert(s); setActiveId(s.id); setConfirmDelS(false);
  };
  // superset grouping
  const linkUp=(idx)=>{ const exs=active.exercises; if(idx<=0) return; const gid=exs[idx-1].ss||uid(); upsert({ ...active, exercises: exs.map((e,j)=> j===idx?{...e,ss:gid}:j===idx-1?{...e,ss:gid}:e) }); };
  const unlinkEx=(idx)=>upsert({ ...active, exercises: active.exercises.map((e,j)=> j===idx?{...e,ss:null}:e) });
  const moveEx=(idx,dir)=>{ const j=idx+dir; if(!active || j<0 || j>=active.exercises.length) return; const c=[...active.exercises]; const [x]=c.splice(idx,1); c.splice(j,0,x); upsert({ ...active, exercises:c }); };
  const addExercise=()=>{
    if(!exName.trim()||!active) return;
    const prev=lastFor(exName, active.date, active.id);
    const sets = prev && prev.sets.length ? prev.sets.map(s=>({ reps:s.reps, weight:s.weight })) : [{ reps:12, weight:"" }];
    const ex={ id:uid(), name:exName.trim(), sets };
    upsert({ ...active, exercises:[...active.exercises, ex] });
    setOpenEx(o=>({ ...o, [ex.id]:true })); setExName("");
  };
  const patchEx=(exId,fn)=>upsert({ ...active, exercises:active.exercises.map(e=>e.id===exId?fn(e):e) });
  const delEx=(exId)=>upsert({ ...active, exercises:active.exercises.filter(e=>e.id!==exId) });
  // presets
  const savePreset=(ex)=>{ if(exPresets.some(p=>p.name.toLowerCase()===(ex.name||"").toLowerCase())) { setExPresets(ps=>ps.map(p=>p.name.toLowerCase()===ex.name.toLowerCase()?{ ...p, sets:ex.sets.map(s=>({reps:s.reps,weight:s.weight})) }:p)); } else { setExPresets(ps=>[...ps,{ id:uid(), name:ex.name, sets:ex.sets.map(s=>({reps:s.reps,weight:s.weight})) }]); } };
  const delPreset=(id)=>setExPresets(ps=>ps.filter(p=>p.id!==id));
  const addFromPreset=(p)=>{ const ex={ id:uid(), name:p.name, sets:p.sets.map(s=>({ reps:s.reps, weight:s.weight })) }; upsert({ ...active, exercises:[...active.exercises, ex] }); setOpenEx(o=>({ ...o, [ex.id]:true })); };
  const applyWorkoutPreset=(p)=>{ // โหลดทั้งชุด: target แช่แข็ง + ค่าจริงแก้หน้างาน + พักรายเซ็ต (รองรับ preset เก่าที่มี rest ระดับท่า)
    const exs=p.items.map(it=>{
      const rests=it.sets.map(s=>s.rest ?? it.rest ?? null);
      const uniform=rests.every(r=>r===rests[0]) ? rests[0] : null;
      return { id:uid(), name:it.name, rest:uniform,
        target: it.sets.map(s=>({ reps:s.reps, weight:s.weight })),
        sets: it.sets.map((s,i2)=>({ reps:s.reps, weight:s.weight, rest:rests[i2] })) };
    });
    upsert({ ...active, title: active.title||p.name, exercises:[...active.exercises, ...exs] });
  };
  // set execution: st = undefined | "active" | "done"
  const startSet=(exId,i)=>patchEx(exId, e=>({ ...e, sets:e.sets.map((s,j)=>j===i?{ ...s, st:"active" }:s.st==="active"?{ ...s, st:undefined }:s) }));
  const doneSet=(exId,i,inSS)=>{
    const exIdx=active.exercises.findIndex(e2=>e2.id===exId); if(exIdx<0) return;
    const remaining = active.exercises.reduce((n,e2)=> n + e2.sets.filter((st2,j)=> !(e2.id===exId&&j===i) && st2.st!=="done").length, 0);
    const exercises=active.exercises.map(e2=>({ ...e2, sets:e2.sets.map(s=>({ ...s })) }));
    exercises[exIdx].sets[i].st="done";
    exercises.forEach(e2=>e2.sets.forEach(s=>{ if(s.st==="active") s.st=undefined; }));
    let placed=false;
    const tryPlace=(e2,fromIdx)=>{ const k=e2.sets.findIndex((s,j)=>j>=fromIdx && s.st!=="done"); if(k>=0){ e2.sets[k].st="active"; placed=true; } };
    tryPlace(exercises[exIdx], i+1); // เซ็ตถัดไปในท่าเดิม
    for(let k=exIdx+1;k<exercises.length && !placed;k++) tryPlace(exercises[k],0); // → เซ็ตแรกท่าถัดไป
    for(let k=0;k<exIdx && !placed;k++) tryPlace(exercises[k],0); // → ท่าก่อนหน้าที่ยังค้าง
    upsert({ ...active, exercises });
    if(remaining<=0){ setFinOpen(true); return; }
    if(!inSS){ const ex=active.exercises[exIdx]; const r=(ex.sets[i]&&ex.sets[i].rest)||ex.rest; startRest(r||undefined); }
  };
  const undoSet=(exId,i)=>patchEx(exId, e=>({ ...e, sets:e.sets.map((s,j)=>j===i?{ ...s, st:undefined }:s) }));

  // ---- list view ----
  if(!active){
    return (
      <div className="space-y-2">
        <button onClick={newSession} className="w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-[.98]" style={{background:T.green,color:"#000"}}><Plus size={17}/> เริ่มบันทึกการเล่นวันนี้</button>
        {sorted.length===0 ? <Empty text="ยังไม่มีบันทึก — กดเริ่มบันทึกด้านบน"/> : sorted.map(w=>(
          <Glass key={w.id} className="p-3 flex items-center gap-3 active:scale-[.99]" onClick={()=>setActiveId(w.id)} style={{cursor:"pointer"}}>
            <div className="w-11 text-center shrink-0">
              <div className="text-[9px]" style={{color:T.muted}}>{TH_D[parseK(w.date).getDay()]}</div>
              <div className="text-base font-bold leading-none">{parseK(w.date).getDate()}</div>
              <div className="text-[9px]" style={{color:T.muted}}>{TH_M[parseK(w.date).getMonth()]}</div>
            </div>
            <div className="flex-1 min-w-0">
              <div className="font-semibold text-sm truncate">{w.title||"(ไม่มีชื่อ)"}</div>
              <div className="text-[10px]" style={{color:T.muted}}>{(w.exercises||[]).length} ท่า · {(w.exercises||[]).reduce((n,e)=>n+(e.sets||[]).length,0)} เซ็ต{w.durationMin?` · ⏱ ${w.durationMin} นาที`:""}</div>
            </div>
            <ChevronRight size={16} style={{color:T.muted}}/>
          </Glass>
        ))}
      </div>
    );
  }

  // ---- session editor ----
  const linkedEv = active.linkedEventId ? (events||[]).find(e=>e.id===active.linkedEventId) : null;
  const renderExCard=(ex, idx, inSS)=>{
    const prev=lastFor(ex.name, active.date, active.id); const isOpen=!!openEx[ex.id];
    const grouped = ex.ss && idx>0 && active.exercises[idx-1].ss===ex.ss;
    const allDone = ex.sets.length>0 && ex.sets.every(sx=>sx.st==="done");
    return (
      <Glass key={ex.id} className="p-0 overflow-hidden">
        <div className="w-full p-3 flex items-center gap-2" style={{background:allDone?hex(T.green,.09):"transparent"}}>
          <button onClick={()=>setOpenEx(o=>({ ...o, [ex.id]:!o[ex.id] }))} className="flex items-center gap-2 flex-1 min-w-0 text-left">
            {allDone
              ? <span className="w-5 h-5 rounded-full flex items-center justify-center shrink-0" style={{background:T.green}}><Check size={13} color="#000"/></span>
              : <Dumbbell size={15} style={{color:T.green}} className="shrink-0"/>}
            <div className="flex-1 min-w-0">
              <div className="font-bold text-sm truncate" style={{color:allDone?T.green:T.text}}>{ex.name}</div>
              <div className="text-[10px]" style={{color:T.muted}}>{ex.sets.length} เซ็ต · {setsSummary(ex.sets)||"—"}{ex.rest?` · พัก ${ex.rest}s`:""}{ex.target?" · มีเป้า":""}</div>
            </div>
          </button>
          <div className="flex flex-col shrink-0">
            <button onClick={()=>moveEx(idx,-1)} disabled={idx===0} aria-label="เลื่อนขึ้น" className="w-6 h-4 flex items-center justify-center" style={{color:idx===0?hex(T.muted,.3):T.muted}}><ChevronUp size={13}/></button>
            <button onClick={()=>moveEx(idx,1)} disabled={idx===active.exercises.length-1} aria-label="เลื่อนลง" className="w-6 h-4 flex items-center justify-center" style={{color:idx===active.exercises.length-1?hex(T.muted,.3):T.muted}}><ChevronDown size={13}/></button>
          </div>
          {idx>0 && <button onClick={()=>grouped?unlinkEx(idx):linkUp(idx)} aria-label="superset" title="รวม/แยก superset กับท่าบน" className="w-7 h-7 rounded-lg flex items-center justify-center shrink-0" style={{color:grouped?T.violet:T.muted, background:grouped?hex(T.violet,.16):"transparent"}}><Repeat size={14}/></button>}
          <button onClick={()=>setOpenEx(o=>({ ...o, [ex.id]:!o[ex.id] }))} className="w-7 h-7 flex items-center justify-center shrink-0"><ChevronDown size={16} style={{color:T.muted, transform:isOpen?"rotate(180deg)":"none", transition:"transform .2s"}}/></button>
        </div>
        {isOpen && (
          <div className="px-3 pb-3">
            {prev && <div className="text-[10px] mb-2 px-2 py-1.5 rounded-lg" style={{background:hex(T.blue,.1),color:T.blue}}>ครั้งก่อน ({shortDate(prev.date)}): {setsSummary(prev.sets)}</div>}
            <div className="space-y-1.5">
              {ex.sets.map((st,i)=>{ const A=st.st==="active", D=st.st==="done";
                return (
                <div key={i} className="flex items-center gap-2 px-1.5 py-1 rounded-lg" style={{background:A?hex(T.green,.14):"transparent", border:`1px solid ${A?hex(T.green,.6):"transparent"}`, opacity:D?0.55:1}}>
                  <span className="w-10 text-[11px] font-semibold shrink-0" style={{color:A?T.green:T.sub, textDecoration:D?"line-through":"none"}}>เซ็ต {i+1}</span>
                  <NumBox value={st.reps} onChange={v=>patchEx(ex.id, e=>({ ...e, sets:e.sets.map((s,j)=>j===i?{ ...s, reps:v===""?"":Number(v) }:s) }))}/>
                  <span className="text-[11px]" style={{color:T.muted}}>×</span>
                  <NumBox value={st.weight} onChange={v=>patchEx(ex.id, e=>({ ...e, sets:e.sets.map((s,j)=>j===i?{ ...s, weight:v===""?"":Number(v) }:s) }))}/>
                  <span className="text-[11px]" style={{color:T.muted}}>kg</span>
                  {ex.target && ex.target[i] && (()=>{ const tg=ex.target[i]; const aw=Number(st.weight)||0, tw=Number(tg.weight)||0; const diff=aw&&tw? (aw>tw?1:aw<tw?-1:0):0;
                    return <span className="text-[9px] shrink-0" style={{color:diff>0?T.green:diff<0?T.red:T.muted}}>เป้า {tg.reps}×{tg.weight}{diff>0?" ▲":diff<0?" ▼":""}</span>; })()}
                  <div className="ml-auto flex items-center gap-1 shrink-0">
                    {D ? (
                      <button onClick={()=>undoSet(ex.id,i)} aria-label="ยกเลิกเสร็จ" className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:hex(T.green,.2),color:T.green}}><Check size={15}/></button>
                    ) : A ? (
                      <button onClick={()=>doneSet(ex.id,i,inSS)} className="px-2.5 h-8 rounded-lg text-[11px] font-bold flex items-center gap-1" style={{background:T.green,color:"#000"}}><Check size={13}/> เสร็จ</button>
                    ) : (
                      <button onClick={()=>startSet(ex.id,i)} aria-label="เริ่มเซ็ตนี้" className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:T.surf,color:T.sub,border:`1px solid ${T.border}`}}><Play size={13}/></button>
                    )}
                    <button onClick={()=>patchEx(ex.id, e=>({ ...e, sets:e.sets.filter((_,j)=>j!==i) }))} className="w-7 h-7 rounded-lg flex items-center justify-center" style={{color:T.muted}}><Minus size={14}/></button>
                  </div>
                </div>
              );})}
            </div>
            <div className="flex gap-2 mt-2">
              <button onClick={()=>patchEx(ex.id, e=>({ ...e, sets:[...e.sets, { reps:(e.sets[e.sets.length-1]||{}).reps??12, weight:(e.sets[e.sets.length-1]||{}).weight??"" }] }))} className="flex-1 py-2 rounded-lg text-xs font-bold" style={{background:hex(T.green,.16),color:T.green}}>+ เพิ่มเซ็ต</button>
              <button onClick={()=>{ savePreset(ex); }} className="px-3 py-2 rounded-lg text-xs font-bold" style={{background:hex(T.gold,.16),color:T.gold}}>บันทึก preset</button>
              {!inSS && <button onClick={()=>startRest(ex.rest||undefined)} className="px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1" style={{background:hex(T.cyan,.16),color:T.cyan}}><Timer size={13}/> พัก{ex.rest?` ${ex.rest}s`:""}</button>}
              <button onClick={()=>delEx(ex.id)} className="px-2.5 py-2 rounded-lg text-xs font-bold" style={{background:T.surf2,color:T.red,border:`1px solid ${hex(T.red,.4)}`}}><Trash2 size={13}/></button>
            </div>
          </div>
        )}
      </Glass>
    );
  };
  // จัดกลุ่ม superset (ท่าติดกันที่มี ss เดียวกัน)
  const blocks=[]; active.exercises.forEach((ex,idx)=>{ const last=blocks[blocks.length-1]; if(ex.ss && last && last.ss===ex.ss){ last.items.push({ex,idx}); } else { blocks.push({ ss:ex.ss||null, items:[{ex,idx}] }); } });
  // ประมาณเวลารวม: เล่น(นาที/เซ็ต ที่กรอก) + พักตาม rest ของท่า (superset พักครั้งเดียวต่อรอบ)
  const playMin=Number(active.playMin)||1;
  const setRestOf=(ex,i2)=>Number((ex.sets[i2]&&ex.sets[i2].rest) ?? ex.rest)||90;
  const estMin=Math.round(blocks.reduce((sec,blk)=>{
    if(blk.items.length>1){ const lastEx=blk.items[blk.items.length-1].ex; const rounds=Math.max(...blk.items.map(({ex})=>ex.sets.length));
      blk.items.forEach(({ex})=>{ sec+=ex.sets.length*playMin*60; });
      for(let r=0;r<rounds;r++) sec+=setRestOf(lastEx, Math.min(r,lastEx.sets.length-1));
      return sec; }
    const ex=blk.items[0].ex; sec+=ex.sets.length*playMin*60; ex.sets.forEach((_,i2)=>{ sec+=setRestOf(ex,i2); }); return sec;
  },0)/60);

  return (
    <div className="space-y-3">
      <div className="flex items-center gap-2">
        <button onClick={()=>setActiveId(null)} className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:T.surf2}}><ChevronLeft size={16}/></button>
        <input value={active.title} onChange={e=>upsert({ ...active, title:e.target.value })} placeholder="ชื่อวัน เช่น หลัง+ไบเซ็บ"
          className="flex-1 px-3 py-2 rounded-xl text-sm font-bold outline-none" style={{background:T.surf,color:T.text,border:`1px solid ${T.border}`}}/>
        {confirmDelS ? (
          <button onClick={()=>{ delSession(active.id); setActiveId(null); }} className="text-[10px] font-bold px-2 py-2 rounded-lg" style={{background:T.red,color:"#fff"}}>ลบ?</button>
        ) : (
          <button onClick={()=>setConfirmDelS(true)} className="w-8 h-8 rounded-lg flex items-center justify-center" style={{color:T.muted}}><Trash2 size={15}/></button>
        )}
      </div>
      <div className="flex items-center gap-2 flex-wrap">
        <div className="text-[10px]" style={{color:T.muted}}>{shortDate(active.date)}</div>
        {linkedEv && <span className="text-[10px] font-bold px-2 py-0.5 rounded-full inline-flex items-center gap-1" style={{background:hex(T.green,.16),color:T.green}}><Dumbbell size={10}/> ลิงก์: {linkedEv.title}</span>}
      </div>
      {(workoutPresets||[]).length>0 && (
        <div className="flex gap-1.5 flex-wrap items-center">

      {/* จบครบทุกเซ็ต */}

            <Stat label="ท่า" value={`${active.exercises.length} ท่า`} color={T.violet}/>

  );
}

const NUTRI_FIELDS=[["cal","Calories","kcal"],["protein","Protein","g"],["carb","Carb","g"],["fat","Fat","g"],["sugar","Sugar","g"],["sodium","Sodium","mg"],["chol","Cholesterol","mg"]];
function Nutrition({ nutrition, setNutrition, nutriTargets, setNutriTargets }){
  const [editT,setEditT]=useState(false);
  const day = nutrition[TK] || {};
  const setVal=(k,v)=>setNutrition(n=>({ ...n, [TK]:{ ...(n[TK]||{}), [k]: v===""?"":Number(v) } }));
  const setTgt=(k,v)=>setNutriTargets(t=>({ ...t, [k]: v===""?"":Number(v) }));
  return (
    <div className="space-y-2">
      <div className="flex items-center justify-between">
        <span className="text-[11px]" style={{color:T.muted}}>กรอกสะสมของวันนี้ · เทียบ target</span>
        <button onClick={()=>setEditT(e=>!e)} className="text-[11px] font-bold px-2.5 py-1.5 rounded-lg" style={{background:editT?T.gold:T.surf2, color:editT?"#000":T.sub, border:`1px solid ${editT?T.gold:T.border}`}}>{editT?"เสร็จสิ้น":"ตั้ง Target"}</button>
      </div>
      {NUTRI_FIELDS.map(([k,label,unit])=>{
        const v=Number(day[k])||0; const tg=Number(nutriTargets[k])||0;
        const pct=tg>0?Math.min(1,v/tg):0; const over=tg>0&&v>tg;
        const barC = over ? T.red : pct>=1 ? T.green : k==="cal"?T.gold : T.green;
        return (
          <div key={k} className="p-2.5 rounded-xl" style={{background:T.surf2, border:`1px solid ${over?hex(T.red,.5):T.border}`}}>
            <div className="flex items-center gap-2">
              <span className="text-xs font-bold w-24 shrink-0" style={{color:T.text}}>{label}</span>
              <NumBox value={day[k]??""} onChange={v2=>setVal(k,v2)} w={70}/>
              <span className="text-[10px]" style={{color:T.muted}}>/ {editT
                ? <NumBox value={nutriTargets[k]??""} onChange={v2=>setTgt(k,v2)} w={62}/>
                : <b style={{color:T.sub}}>{tg||"—"}</b>} {unit}</span>
              <span className="ml-auto text-[10px] font-bold" style={{color:over?T.red:pct>=1?T.green:T.muted}}>{tg?Math.round((v/tg)*100)+"%":""}</span>
            </div>
            {tg>0 && <div className="h-1 rounded-full mt-1.5 overflow-hidden" style={{background:T.surf}}><div style={{width:`${Math.min(100,(v/tg)*100)}%`,height:"100%",background:barC}}/></div>}
          </div>
        );
      })}
      <div className="text-[10px] text-center" style={{color:T.muted}}>Sodium/Cholesterol หน่วยเป็น mg ตามฉลากโภชนาการ · เกิน target แถบจะเป็นสีแดง</div>
    </div>
  );
}

function ProgressChart({ workouts }){
  // ท่าทั้งหมดที่เคยบันทึก (นับจำนวนครั้งที่โผล่)
  const names=useMemo(()=>{
    const m={}; workouts.forEach(w=>(w.exercises||[]).forEach(e=>{ const k=(e.name||"").trim(); if(k) m[k]=(m[k]||0)+1; }));
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
  },[workouts]);
  const [sel,setSel]=useState(names[0]||"");
  const pick = names.includes(sel) ? sel : (names[0]||"");

  // series: max weight ต่อ session (เรียงตามวันที่)
  const series=useMemo(()=>{
    if(!pick) return [];
    const rows=[];
    workouts.filter(w=>(w.exercises||[]).some(e=>(e.name||"").trim()===pick))
      .forEach(w=>{ const ex=w.exercises.find(e=>(e.name||"").trim()===pick); const wts=(ex.sets||[]).map(s=>Number(s.weight)||0); const mx=Math.max(0,...wts); rows.push({ date:w.date, weight:mx }); });
    return rows.sort((a,b)=>a.date.localeCompare(b.date));
  },[workouts,pick]);

  if(names.length===0) return <Empty text="ยังไม่มีข้อมูล — บันทึกการเล่นก่อน แล้วกราฟจะขึ้นเอง"/>;

  const W=300,H=140,padL=32,padB=22,padT=10,padR=8;
  const maxW=Math.max(1,...series.map(s=>s.weight));
  const minW=0;
  const n=series.length;
  const xAt=(i)=> padL + (n<=1?0:(i/(n-1))*(W-padL-padR));
  const yAt=(v)=> padT + (1-(v-minW)/(maxW-minW||1))*(H-padT-padB);
  const linePts=series.map((s,i)=>`${xAt(i)},${yAt(s.weight)}`).join(" ");
  const first=series[0]?.weight||0, last=series[series.length-1]?.weight||0; const delta=last-first;

  return (
    <div className="space-y-3">
      <div className="flex gap-1.5 flex-wrap">
        {names.slice(0,12).map(nm=>{ const on=nm===pick;
          return <button key={nm} onClick={()=>setSel(nm)} className="px-2.5 py-1.5 rounded-lg text-[11px] font-semibold" style={{background:on?T.blue:T.surf2,color:on?"#000":T.sub,border:`1px solid ${on?T.blue:T.border}`}}>{nm}</button>;
        })}
      </div>
      {series.length<2 ? (
        <Empty text="ต้องมีอย่างน้อย 2 ครั้งของท่านี้ถึงจะเห็นเส้นกราฟ"/>
      ) : (
        <Glass className="p-3">
          <div className="flex items-baseline gap-2 mb-1">
            <span className="text-2xl font-extrabold" style={{color:T.blue}}>{last} kg</span>
            <span className="text-xs font-bold" style={{color:delta>=0?T.green:T.red}}>{delta>=0?"▲ +":"▼ "}{Math.abs(delta)} kg</span>
            <span className="text-[10px] ml-auto" style={{color:T.muted}}>{n} ครั้ง</span>
          </div>
          <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:"block"}}>
            {[0,0.5,1].map((f,i)=>{ const y=padT+f*(H-padT-padB); const val=Math.round(maxW-(f*(maxW-minW)));
              return <g key={i}><line x1={padL} y1={y} x2={W-padR} y2={y} stroke={hex(T.border,.8)} strokeWidth="1"/><text x="2" y={y+3} fontSize="8" fill={T.muted}>{val}</text></g>;
            })}
            <polyline points={linePts} fill="none" stroke={T.blue} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
            {series.map((s,i)=><circle key={i} cx={xAt(i)} cy={yAt(s.weight)} r="3" fill={T.blue}/>)}
            {series.map((s,i)=>{ if(n>6 && i%2===1 && i!==n-1) return null;
              return <text key={"t"+i} x={xAt(i)} y={H-8} fontSize="7.5" fill={T.muted} textAnchor="middle">{parseK(s.date).getDate()}/{parseK(s.date).getMonth()+1}</text>;
            })}
          </svg>
          <div className="text-[10px] text-center mt-1" style={{color:T.muted}}>น้ำหนักสูงสุดต่อครั้ง · ท่า: {pick}</div>
        </Glass>
      )}
    </div>
  );
}

/* ── สร้าง Workout Preset ตามส่วน (ล่วงหน้า) ── */
function WorkoutPresetModal({ onClose, onSave, initial }){
  const [name,setName]=useState(initial?initial.name:"");
  const mkSet=(prev)=> prev ? { ...prev } : { reps:12, weight:"", rest:90 };
  const [items,setItems]=useState(()=> initial
    ? initial.items.map(it=>({ name:it.name, sets:it.sets.map(st=>({ reps:st.reps, weight:st.weight, rest:(st.rest ?? it.rest ?? 90) })) }))
    : [{ name:"", sets:[mkSet(),mkSet(),mkSet()] }]);
  const patch=(i,p)=>setItems(xs=>xs.map((x,j)=>j===i?{ ...x, ...p }:x));
  const patchSet=(i,si,p)=>setItems(xs=>xs.map((x,j)=>j===i?{ ...x, sets:x.sets.map((st,k)=>k===si?{ ...st, ...p }:st) }:x));
  const addSet=(i)=>setItems(xs=>xs.map((x,j)=>j===i?{ ...x, sets:[...x.sets, mkSet(x.sets[x.sets.length-1])] }:x));
  const delSet=(i,si)=>setItems(xs=>xs.map((x,j)=>j===i?{ ...x, sets:x.sets.filter((_,k)=>k!==si) }:x));
  const moveItem=(i,dir)=>setItems(xs=>{ const j=i+dir; if(j<0||j>=xs.length) return xs; const c=[...xs]; const [x]=c.splice(i,1); c.splice(j,0,x); return c; });
  const valid=name.trim() && items.some(x=>x.name.trim() && x.sets.length);
  const save=()=>{
    const its=items.filter(x=>x.name.trim() && x.sets.length).map(x=>({ name:x.name.trim(),
      sets: x.sets.map(st=>({ reps:Number(st.reps)||0, weight:st.weight===""?"":Number(st.weight), rest:Number(st.rest)||null })) }));
    onSave({ id:(initial&&initial.id)||uid(), name:name.trim(), items:its });
  };
  return (
    <Sheet onClose={onClose} title={initial?"แก้ไข Preset ชุดท่า":"สร้าง Preset ชุดท่า"}>
      <Input label="ชื่อชุด (เช่น อก, หลัง+ไบเซ็บ)" value={name} onChange={setName} placeholder="อก"/>
      <div className="space-y-2 mb-3">
        {items.map((x,i)=>(
          <div key={i} className="p-2.5 rounded-xl space-y-1.5" style={{background:T.surf2, border:`1px solid ${T.border}`}}>
            <div className="flex items-center gap-2">
              <input value={x.name} onChange={e=>patch(i,{name:e.target.value})} placeholder={`ท่าที่ ${i+1} เช่น Bench Press`}
                className="flex-1 px-2.5 py-2 rounded-lg text-sm outline-none" style={{background:T.surf,color:T.text,border:`1px solid ${T.border}`}}/>
              <div className="flex flex-col shrink-0">
                <button onClick={()=>moveItem(i,-1)} disabled={i===0} aria-label="เลื่อนขึ้น" className="w-6 h-4 flex items-center justify-center" style={{color:i===0?hex(T.muted,.3):T.muted}}><ChevronUp size={13}/></button>
                <button onClick={()=>moveItem(i,1)} disabled={i===items.length-1} aria-label="เลื่อนลง" className="w-6 h-4 flex items-center justify-center" style={{color:i===items.length-1?hex(T.muted,.3):T.muted}}><ChevronDown size={13}/></button>
              </div>
              {items.length>1 && <button onClick={()=>setItems(xs=>xs.filter((_,j)=>j!==i))} aria-label="ลบท่า" className="w-7 h-7 rounded-lg flex items-center justify-center shrink-0" style={{color:T.red}}><Trash2 size={14}/></button>}
            </div>
            {/* หัวคอลัมน์ */}
            <div className="flex items-center gap-1.5 text-[9px] pl-9" style={{color:T.muted}}>
              <span style={{width:46,textAlign:"center"}}>ครั้ง</span><span style={{width:54,textAlign:"center"}}>kg</span><span style={{width:54,textAlign:"center"}}>พัก(วิ)</span>
            </div>
            {x.sets.map((st,si)=>(
              <div key={si} className="flex items-center gap-1.5">
                <span className="text-[10px] font-semibold shrink-0" style={{color:T.sub, width:30}}>ซ.{si+1}</span>
                <NumBox value={st.reps} onChange={v=>patchSet(i,si,{reps:v})} w={46}/>
                <NumBox value={st.weight} onChange={v=>patchSet(i,si,{weight:v})} w={54}/>
                <NumBox value={st.rest} onChange={v=>patchSet(i,si,{rest:v})} w={54}/>
                {x.sets.length>1 && <button onClick={()=>delSet(i,si)} aria-label="ลบเซ็ต" className="ml-auto w-6 h-6 rounded-md flex items-center justify-center shrink-0" style={{color:T.muted}}><Minus size={13}/></button>}
              </div>
            ))}
            <button onClick={()=>addSet(i)} className="w-full py-1.5 rounded-lg text-[11px] font-bold" style={{background:hex(T.green,.12),color:T.green}}>+ เพิ่มเซ็ต (คัดลอกเซ็ตล่าสุด)</button>
          </div>
        ))}
        <button onClick={()=>setItems(xs=>[...xs,{ name:"", sets:[mkSet(),mkSet(),mkSet()] }])} className="w-full py-2 rounded-lg text-xs font-bold" style={{background:hex(T.violet,.14),color:T.violet,border:`1px dashed ${hex(T.violet,.5)}`}}>+ เพิ่มท่า</button>
      </div>
      <SaveBtn disabled={!valid} onClick={save}>{initial?"บันทึกการแก้ไข":"บันทึก Preset"}</SaveBtn>
    </Sheet>
  );
}

/* ════════════════ FITNESS ════════════════ */
const TH_DAY_FULL = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัส","ศุกร์","เสาร์"];
const WEEK_ORDER = [1,2,3,4,5,6,0]; // จันทร์ก่อน
function Fitness(props){
  const { whoop, setWhoop, fitnessSplit, saveFitnessSplit, fitnessStartDay, setFitnessStartDay, fitnessConfirmed, confirmFitnessWeek, events, workouts, updateWorkouts, nutrition, setNutrition, nutriTargets, setNutriTargets, exPresets, setExPresets, workoutPresets, setWorkoutPresets } = props;
  const [wpOpen,setWpOpen]=useState(false);
  const [wpEdit,setWpEdit]=useState(null);
  const [wpDel,setWpDel]=useState(null);
  const [draft,setDraft]=useState(()=> fitnessSplit || {});
  const [editing,setEditing]=useState(false);

  const rec=whoop.recovery;
  const verdict = rec>=67 ? { t:"พร้อมเต็มที่ — เล่นหนักได้ตามตาราง", c:T.green }
    : rec>=34 ? { t:"ปานกลาง — เล่นได้ แต่ลดปริมาณ/เซ็ตลงหน่อย", c:T.gold }
    : { t:"ฟื้นตัวต่ำ — ควรพักหรือเล่นเบา (คาร์ดิโอเบา/ยืดเหยียด) พิจารณาเลื่อนวันหนักออกไป", c:T.red };

  // this week
  const todayD=parseK(TK);
  const diff=(todayD.getDay()-fitnessStartDay+7)%7;
  const weekStart=addDays(todayD,-diff);
  const weekKey=dkey(weekStart);
  const weekDates=Array.from({length:7},(_,i)=>addDays(weekStart,i));
  const confirmed=!!fitnessConfirmed[weekKey];

  const planTitle=(plan)=> plan.kind==="weight" ? `GYM: ${(plan.parts||[]).join("+")||"เต็มตัว"}` : `SPORTS${plan.sport?": "+plan.sport:""}`;
  const genEvents=()=> weekDates.map(wd=>{ const plan=(fitnessSplit||{})[wd.getDay()]; if(!plan || plan.kind==="rest" || !plan.kind) return null;
    return { title:planTitle(plan), type:"fitness", date:dkey(wd), startTime:"18:00", endTime:"19:00", location:"", energyCost:3, income:0, fitKind:plan.kind, fitParts:plan.parts||[], fitSport:plan.sport||"", fromFitness:true };
  }).filter(Boolean);
  const planDaysCount = WEEK_ORDER.filter(d=>{ const p=(fitnessSplit||{})[d]; return p && p.kind && p.kind!=="rest"; }).length;

  const setDay=(d,patch)=>setDraft(s=>({ ...s, [d]:{ ...(s[d]||{kind:"rest",parts:[]}), ...patch } }));
  const togPart=(d,p)=>setDraft(s=>{ const cur=s[d]||{kind:"weight",parts:[]}; const parts=cur.parts||[]; return { ...s, [d]:{ ...cur, parts: parts.includes(p)?parts.filter(x=>x!==p):[...parts,p] } }; });

  return (
    <div className="px-4 pt-5 space-y-4">
      <h1 className="text-2xl font-extrabold">Fitness</h1>

      {/* สรุปค่าร่างกาย + คำแนะนำ */}
      <Glass className="p-4" glowColor={verdict.c}>
        <div className="flex items-center gap-2 mb-3"><Dumbbell size={16} style={{color:verdict.c}}/><span className="font-bold text-sm">สรุปค่าร่างกายวันนี้</span></div>
        <div className="grid grid-cols-2 gap-2 mb-3">
          <div><div className="text-[10px]" style={{color:T.muted}}>Recovery</div><div className="text-lg font-extrabold" style={{color:verdict.c}}>{rec}%</div></div>
          <div><div className="text-[10px]" style={{color:T.muted}}>Sleep</div><div className="text-lg font-extrabold" style={{color:T.blue}}>{whoop.sleep}%</div></div>
        </div>
        {[["recovery","Recovery",verdict.c],["sleep","Sleep",T.blue]].map(([k,lbl,c])=>(
          <div key={k} className="mb-2">
            <input type="range" min={0} max={100} step={1} value={whoop[k]} aria-label={lbl}
              onChange={e=>setWhoop(w=>({...w,[k]:Number(e.target.value)}))} className="w-full" style={{accentColor:c}}/>
          </div>
        ))}
        <div className="p-2.5 rounded-lg text-xs font-semibold" style={{background:hex(verdict.c,.14), color:verdict.c}}>{verdict.t}</div>
        <div className="text-[10px] mt-2" style={{color:T.muted}}>* เลื่อนแถบกรอกเลขที่ WHOOP สรุปตอนเช้า — เชื่อม API อัตโนมัติไว้เฟสถัดไป</div>
      </Glass>

      {/* โภชนาการ + บันทึกการเล่น (timer พักเด้งเป็น overlay อัตโนมัติ) */}
      <Collapse title="โภชนาการวันนี้" icon={Heart} count={""} color={T.gold}>
        <Nutrition nutrition={nutrition} setNutrition={setNutrition} nutriTargets={nutriTargets} setNutriTargets={setNutriTargets}/>
      </Collapse>
      <Collapse title="Preset ชุดท่า (ตามส่วน)" icon={Repeat} count={workoutPresets.length} color={T.violet}>
        <div className="space-y-2">
          {workoutPresets.length===0 ? <div className="text-[11px]" style={{color:T.muted}}>ตั้งชุดท่าล่วงหน้า เช่น "อก" ใส่ท่า/เซ็ต/น้ำหนัก/เวลาพัก — วันเล่นจริงกด "โหลดชุด" ในบันทึกการเล่น ค่าที่ตั้งจะกลายเป็น "เป้า" ให้เทียบกับที่ทำได้จริง</div>
            : workoutPresets.map(p=>(
              <Glass key={p.id} className="p-3 flex items-center gap-2">
                <div className="flex-1 min-w-0">
                  <div className="font-bold text-sm truncate">{p.name}</div>
                  <div className="text-[10px] truncate" style={{color:T.muted}}>{p.items.map(x=>x.name).join(", ")}</div>
                </div>
                <button onClick={()=>setWpEdit(p)} aria-label="แก้ไข preset" className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0" style={{color:T.blue}}><Pencil size={14}/></button>
                {wpDel===p.id
                  ? <button onClick={()=>{ setWorkoutPresets(ps=>ps.filter(x=>x.id!==p.id)); setWpDel(null); }} className="text-[11px] font-bold px-2.5 py-2 rounded-lg shrink-0 active:scale-95" style={{background:T.red,color:"#fff"}}>ยืนยันลบ</button>
                  : <button onClick={()=>setWpDel(p.id)} className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0" style={{color:T.muted}}><Trash2 size={14}/></button>}
              </Glass>
            ))}
          <button onClick={()=>setWpOpen(true)} className="w-full py-2.5 rounded-xl text-xs font-bold" style={{background:hex(T.violet,.14),color:T.violet,border:`1px dashed ${hex(T.violet,.5)}`}}>+ สร้าง Preset ชุดท่า</button>
        </div>
      </Collapse>
      <Collapse title="บันทึกการเล่น (Workout)" icon={Dumbbell} count={workouts.length} color={T.green} defaultOpen>
        <WorkoutLog workouts={workouts} updateWorkouts={updateWorkouts} events={events} exPresets={exPresets} setExPresets={setExPresets} workoutPresets={workoutPresets}/>
      </Collapse>
      <Collapse title="กราฟความก้าวหน้า (น้ำหนัก)" icon={TrendingUp} count={""} color={T.blue}>
        <ProgressChart workouts={workouts}/>
      </Collapse>

      {/* ตารางสัปดาห์นี้ + ยืนยัน */}
      <Glass className="p-4">
        <div className="flex items-center justify-between mb-1">
          <span className="font-bold text-sm">สัปดาห์นี้ · เริ่ม{TH_DAY_FULL[fitnessStartDay]} {shortDate(weekKey)}</span>
          {confirmed ? <Pill color={T.green} solid><Check size={11}/> ยืนยันแล้ว</Pill> : <Pill color={T.blue}>ยังไม่ยืนยัน</Pill>}
        </div>
        <div className="space-y-1.5 mt-2">
          {weekDates.map(wd=>{ const plan=(fitnessSplit||{})[wd.getDay()]; const isRest=!plan||!plan.kind||plan.kind==="rest"; const isToday=dkey(wd)===TK;
            return (
              <div key={dkey(wd)} className="flex items-center gap-2 text-xs">
                <span className="w-14 shrink-0 font-semibold" style={{color:isToday?T.green:T.sub}}>{TH_DAY_FULL[wd.getDay()]}</span>
                <span className="flex-1" style={{color:isRest?T.muted:T.text}}>{isRest?"REST DAY":planTitle(plan)}</span>
              </div>
            );
          })}
        </div>
        {planDaysCount===0
          ? <div className="text-[11px] mt-3 text-center" style={{color:T.muted}}>ยังไม่มีตาราง — กด “ตั้ง/แก้ตาราง” ด้านล่าง</div>
          : confirmed
            ? <div className="text-[11px] mt-3 text-center" style={{color:T.green}}>สร้าง {planDaysCount} วันเข้า Calendar แล้ว ✓</div>
            : <button onClick={()=>confirmFitnessWeek(weekKey, genEvents())} className="w-full mt-3 py-2.5 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-[.98]" style={{background:T.green,color:"#000"}}>
                <Check size={16}/> ยืนยันตารางเหมือนเดิม → สร้าง {planDaysCount} วันเข้า Calendar
              </button>}
        <div className="text-[10px] mt-2 text-center" style={{color:T.muted}}>วันที่ร่างกายพร้อมน้อย เลื่อน/แก้เวลาได้เองในหน้า Calendar (ปุ่ม ✎)</div>
      </Glass>

      {/* ตั้ง/แก้ตาราง */}
      {!editing ? (
        <button onClick={()=>{ setDraft(fitnessSplit||{}); setEditing(true); }} className="w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-[.98]" style={{background:T.surf2, color:T.green, border:`1px solid ${hex(T.green,.5)}`}}><Pencil size={15}/> ตั้ง/แก้ตารางประจำสัปดาห์</button>
      ) : (
        <Glass className="p-4">
          <div className="flex items-center justify-between mb-2">
            <span className="font-bold text-sm">ตั้งตารางประจำ (ซ้ำทุกสัปดาห์)</span>
          </div>
          <div className="mb-3">
            <Label>วันเริ่มสัปดาห์</Label>
            <div className="flex gap-1 flex-wrap">
              {WEEK_ORDER.map(d=>{ const on=fitnessStartDay===d;
                return <button key={d} onClick={()=>setFitnessStartDay(d)} className="px-2 py-1 rounded-lg text-[11px] font-bold" style={{background:on?T.purple:T.surf2,color:on?"#fff":T.sub}}>{TH_D[d]}</button>;
              })}
            </div>
          </div>
          <div className="space-y-2">
            {WEEK_ORDER.map(d=>{ const cur=draft[d]||{kind:"rest",parts:[]};
              return (
                <div key={d} className="p-2.5 rounded-xl" style={{background:T.surf2, border:`1px solid ${T.border}`}}>
                  <div className="flex items-center gap-2 mb-1.5">
                    <span className="w-14 text-xs font-bold" style={{color:T.sub}}>{TH_DAY_FULL[d]}</span>
                    <div className="flex gap-1 flex-1">
                      {[["rest","REST DAY"],["weight","GYM"],["sport","SPORTS"]].map(([k,l])=>{ const on=cur.kind===k;
                        return <button key={k} onClick={()=>setDay(d,{kind:k})} className="flex-1 py-1.5 rounded-lg text-[10px] font-bold" style={{background:on?(k==="rest"?T.slate:T.green):"transparent",color:on?(k==="rest"?"#fff":"#000"):T.sub,border:`1px solid ${on?(k==="rest"?T.slate:T.green):T.border}`}}>{l}</button>;
                      })}
                    </div>
                  </div>
                  {cur.kind==="weight" && (
                    <div className="flex gap-1 flex-wrap pl-16">
                      {[...MUSCLE_PARTS,...GYM_STYLES].map(p=>{ const on=(cur.parts||[]).includes(p); const isStyle=GYM_STYLES.includes(p);
                        return <button key={p} onClick={()=>togPart(d,p)} className="px-2 py-1 rounded-lg text-[10px] font-medium" style={{background:on?(isStyle?T.cyan:T.green):T.surf,color:on?"#000":T.sub,border:`1px solid ${on?(isStyle?T.cyan:T.green):T.border}`}}>{on?"✓":""}{p}</button>;
                      })}
                    </div>
                  )}
                  {cur.kind==="sport" && (
                    <div className="flex gap-1 flex-wrap pl-16">
                      {SPORT_LIST.map(sp=>{ const on=cur.sport===sp;
                        return <button key={sp} onClick={()=>setDay(d,{sport:sp})} className="px-2 py-1 rounded-lg text-[10px] font-medium" style={{background:on?T.green:T.surf,color:on?"#000":T.sub,border:`1px solid ${on?T.green:T.border}`}}>{on?"✓":""}{sp}</button>;
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div className="flex gap-2 mt-3">
            <button onClick={()=>{ saveFitnessSplit(draft); setEditing(false); }} className="flex-1 py-2.5 rounded-xl font-bold" style={{background:T.green,color:"#000"}}>บันทึกตาราง</button>
            <button onClick={()=>setEditing(false)} className="flex-1 py-2.5 rounded-xl font-bold" style={{background:T.surf2,color:T.sub,border:`1px solid ${T.border}`}}>ยกเลิก</button>
          </div>
        </Glass>
      )}

      {(wpOpen||wpEdit) && <WorkoutPresetModal initial={wpEdit} onClose={()=>{ setWpOpen(false); setWpEdit(null); }} onSave={(p)=>{ setWorkoutPresets(ps=> ps.some(x=>x.id===p.id) ? ps.map(x=>x.id===p.id?p:x) : [...ps,p]); setWpOpen(false); setWpEdit(null); }}/>}
      <div className="text-[10px] text-center pb-2" style={{color:T.muted}}>ตารางนี้ซ้ำทุกสัปดาห์โดยไม่ต้องสร้างล่วงหน้า — พอถึงสัปดาห์ใหม่มากดยืนยันเพื่อสร้าง event จริงเข้า Calendar</div>
    </div>
  );
}

/* ════════════════ DASHBOARD ════════════════ */
function Dashboard(props){
  const { reviews, whoop, streak, events, workouts } = props;
  // 7 วันล่าสุด (เก่า→ใหม่)
  const row = Array.from({length:7},(_,i)=>{
    const dt=addDays(today,-6+i); const k=dkey(dt); const isT=k===TK; const rv=reviews[k];
    const evs=events.filter(e=>e.date===k);
    return {
      dn:TH_D[dt.getDay()],
      closed: !!rv,
      done: evs.filter(e=>e.status==="done").length,
      total: evs.length,
      rec: rv?.whoop?.recovery ?? (isT? whoop.recovery : null),
      trained: workouts.some(w=>w.date===k),
    };
  });
  const closedCount=row.filter(x=>x.closed).length;
  const doneSum=row.reduce((s,x)=>s+x.done,0);
  const trainCount=row.filter(x=>x.trained).length;
  const recKnown=row.map(x=>x.rec).filter(v=>v!=null);
  const avgRec=recKnown.length?Math.round(recKnown.reduce((a,b)=>a+b,0)/recKnown.length):0;
  const recFilled=row.map(x=>x.rec==null?avgRec:x.rec);

  return (
    <div className="px-4 pt-5 space-y-4">
      <h1 className="text-2xl font-extrabold">Weekly Dashboard</h1>
      <div className="grid grid-cols-2 gap-2">
        <Stat label="Streak" value={`${streak} วัน`} color={T.orange}/>
        <Stat label="ปิดวันครบ" value={`${closedCount}/7 วัน`} color={T.green}/>
        <Stat label="งานเสร็จ (7 วัน)" value={`${doneSum} งาน`} color={T.blue}/>
        <Stat label="วันออกกำลัง" value={`${trainCount} วัน`} color={T.purple}/>
      </div>

      {/* heatmap ปิดวัน */}
      <Glass className="p-4">
        <div className="text-sm font-bold mb-2">ปิดวัน (Daily Review) Heatmap</div>
        <div className="flex gap-1.5 justify-between">{row.map((x,i)=>(
          <div key={i} className="flex-1 flex flex-col items-center gap-1">
            <div className="w-full aspect-square rounded-md" style={{background:x.closed?T.green:T.surf2, boxShadow:x.closed?`0 0 8px ${hex(T.green,.5)}`:"none"}}/>
            <span className="text-[9px]" style={{color:T.muted}}>{x.dn}</span>
          </div>
        ))}</div>
      </Glass>

      {/* recovery trend */}
      <Glass className="p-4">
        <div className="flex items-center gap-2 mb-2"><TrendingUp size={15} style={{color:T.green}}/><span className="text-sm font-bold">Recovery</span><span className="text-[10px] ml-auto" style={{color:T.muted}}>เฉลี่ย {avgRec}%</span></div>
        <Spark data={recFilled} color={T.green}/>
        <div className="flex justify-between mt-1">{row.map((x,i)=><span key={i} className="text-[9px]" style={{color:T.muted}}>{x.dn}</span>)}</div>
      </Glass>

      {/* งานเสร็จรายวัน */}
      <Glass className="p-4">
        <div className="text-sm font-bold mb-3">งานเสร็จรายวัน</div>
        <div className="flex items-end justify-between gap-1.5" style={{height:90}}>{row.map((x,i)=>{const mx=Math.max(1,...row.map(r2=>r2.total)); return (
          <div key={i} className="flex-1 flex flex-col items-center gap-1 h-full justify-end">
            <span className="text-[8px] font-bold" style={{color:x.total?T.blue:T.muted}}>{x.total?`${x.done}/${x.total}`:"–"}</span>
            <div className="w-full rounded-t-md" style={{height:`${x.total?Math.max(6,(x.done/mx)*100):4}%`, background:x.done?T.blue:T.border}}/>
            <span className="text-[9px]" style={{color:T.muted}}>{x.dn}</span>
          </div>
        );})}</div>
      </Glass>
      <div className="text-[10px] text-center pb-2" style={{color:T.muted}}>ข้อมูลจริงจาก event · Daily Review · workout log ใน 7 วันล่าสุด</div>
    </div>
  );
}
function Spark({data,color}){
  const w=300,h=56,mx=Math.max(...data),mn=Math.min(...data);
  const pts=data.map((v,i)=>[i/(data.length-1)*w, h-((v-mn)/(mx-mn||1))*(h-8)-4]);
  const dpath=pts.map((p,i)=>`${i?"L":"M"}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" ");
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full" style={{height:56}}>
      <path d={`${dpath} L${w} ${h} L0 ${h} Z`} fill={hex(color,.15)}/>
      <path d={dpath} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" style={{filter:`drop-shadow(0 0 4px ${hex(color,.6)})`}}/>
      {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r="2.5" fill={color}/>)}
    </svg>
  );
}

/* ════════════════ SHARED SMALL COMPONENTS ════════════════ */
function QuestRow({q,onToggle,onDelete,types}){
  const QT=actTypeInfo(types,q.type); const done=q.status==="done";
  return (
    <Glass className="p-3 flex items-center gap-3" style={{borderLeft:`3px solid ${QT.color}`, opacity:done?0.6:1}}>
      <button onClick={()=>onToggle(q.id)} className="w-6 h-6 rounded-full flex items-center justify-center shrink-0 active:scale-90" style={{background:done?QT.color:"transparent",border:`2px solid ${done?QT.color:T.border}`}}>{done&&<Check size={14} color="#000"/>}</button>
      <div className="flex-1 min-w-0">
        <div className="font-semibold text-sm truncate" style={{textDecoration:done?"line-through":"none"}}>{q.title}</div>
        <div className="text-[10px]" style={{color:T.muted}}>{QT.label}</div>
      </div>
      {onDelete && <button onClick={()=>onDelete(q.id)} className="shrink-0" style={{color:T.muted}}><X size={15}/></button>}
    </Glass>
  );
}
const Section = ({title,icon:Icon,dot,action,children}) => (
  <div>
    <div className="flex items-center gap-2 mb-2 px-1">
      {Icon && <Icon size={15} style={{color:T.sub}}/>}
      {dot && <span className="w-2.5 h-2.5 rounded-full" style={{background:dot}}/>}
      <h2 className="text-sm font-bold tracking-wide" style={{color:T.sub}}>{title}</h2>
      {action && <div className="ml-auto">{action}</div>}
    </div>
    {children}
  </div>
);
const Stat = ({label,value,color}) => (
  <Glass className="p-3"><div className="text-[10px]" style={{color:T.muted}}>{label}</div><div className="text-lg font-extrabold" style={{color:color||T.text}}>{value}</div></Glass>
);
const Empty = ({text}) => (
  <Glass className="py-8 flex items-center justify-center"><span className="text-xs" style={{color:T.muted}}>{text}</span></Glass>
);

/* form atoms */
const Label = ({children}) => <div className="text-[11px] font-semibold mb-1" style={{color:T.sub}}>{children}</div>;
function Input({label,value,onChange,placeholder,type="text"}){
  return <div className="mb-3"><Label>{label}</Label>
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      className="w-full px-3 py-2.5 rounded-xl text-sm outline-none" style={{background:T.surf2,color:T.text,border:`1px solid ${T.border}`}}/></div>;
}
function TimeInput({value,onChange}){
  return <input type="time" value={value} onChange={e=>onChange(e.target.value)} className="w-full px-3 py-2.5 rounded-xl text-sm outline-none" style={{background:T.surf2,color:T.text,border:`1px solid ${T.border}`}}/>;
}
function DateInput({value,onChange}){
  return <input type="date" value={value} onChange={e=>onChange(e.target.value)} className="w-full px-3 py-2.5 rounded-xl text-sm outline-none" style={{background:T.surf2,color:T.text,border:`1px solid ${T.border}`}}/>;
}
const SaveBtn = ({disabled,onClick,children}) => (
  <button disabled={disabled} onClick={onClick} className="w-full py-3.5 rounded-xl font-bold active:scale-[.98] transition" style={{background:disabled?T.border:T.green,color:disabled?T.muted:"#000"}}>{children}</button>
);
function Sheet({title,onClose,children}){
  return (
    <div className="fixed inset-0 z-40 flex items-end justify-center" style={{background:"rgba(0,0,0,.6)"}} onClick={onClose}>
      <div className="w-full max-w-md rounded-t-3xl p-5 pb-7 max-h-[88vh] overflow-y-auto" style={{background:T.surf,border:`1px solid ${T.border}`}} onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4"><h3 className="font-bold text-lg">{title}</h3><button onClick={onClose} className="w-9 h-9 rounded-full flex items-center justify-center" style={{background:T.surf2}}><X size={18}/></button></div>
        {children}
      </div>
    </div>
  );
}

/* ── Daily Review (form → result) ── */
function DailyReviewModal({ mode, M, liveScore, streak, onClose, onSubmit }){
  const [phase,setPhase]=useState("form");
  const [f,setF]=useState({ win:"", obstacle:"", tomorrowFocus:"", actualEnergy:"ดี" });
  const [result,setResult]=useState(null);
  const submit=()=>{ const rec=onSubmit(f); setResult(rec); setPhase("result"); };

  return (
    <Sheet onClose={onClose} title={phase==="form"?"Daily Review":"สรุปวันนี้"}>
      {phase==="form" ? (
        <>
          <ReviewField label="1 · วันนี้ชนะอะไร?" value={f.win} onChange={v=>setF({...f,win:v})} ph="เช่น สอนครบ + ตัดคลิปเสร็จ"/>
          <ReviewField label="2 · อะไรทำให้หลุด?" value={f.obstacle} onChange={v=>setF({...f,obstacle:v})} ph="ไม่มีก็เว้นได้"/>
          <ReviewField label="3 · พรุ่งนี้โฟกัสอะไร?" value={f.tomorrowFocus} onChange={v=>setF({...f,tomorrowFocus:v})} ph="เลือก 1 อย่างพอ"/>
          <div className="mb-3"><Label>4 · Energy จริงของวันนี้</Label>
            <div className="flex gap-1.5">{["ล้า","กลางๆ","ดี","พีค"].map(e=>{const on=f.actualEnergy===e;return (
              <button key={e} onClick={()=>setF({...f,actualEnergy:e})} className="flex-1 py-2 rounded-lg text-sm font-bold" style={{background:on?T.blue:T.surf2,color:on?"#000":T.sub}}>{e}</button>
            );})}</div>
          </div>
          <SaveBtn disabled={!f.win.trim()} onClick={submit}>บันทึก & จบวัน</SaveBtn>
        </>
      ) : (
        <div className="text-center">
          <div className="text-5xl mt-2 mb-3">🔥</div>
          <div className="font-extrabold text-lg">ปิดวันเรียบร้อย</div>
          <div className="flex justify-center gap-2 mt-3">
            <Stat label="Streak" value={`${streak} วัน`} color={T.orange}/>
          </div>
          <div className="text-sm mt-3 px-2" style={{color:T.sub}}>พรุ่งนี้โฟกัส: {result.tomorrowFocus||"—"}</div>
          <button onClick={onClose} className="w-full py-3.5 rounded-xl font-bold mt-5" style={{background:T.green,color:"#000"}}>เยี่ยม!</button>
        </div>
      )}
    </Sheet>
  );
}
function ReviewField({label,value,onChange,ph}){
  return (
    <div className="mb-3"><Label>{label}</Label>
      <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={ph} rows={2}
        className="w-full px-3 py-2.5 rounded-xl text-sm outline-none resize-none" style={{background:T.surf2,color:T.text,border:`1px solid ${T.border}`}}/>
    </div>
  );
}


document.getElementById("boot").style.display="none";
createRoot(document.getElementById("root")).render(<App />);
} catch(err){showErr("APP ERROR:\n"+(err&&err.stack?err.stack:err));}
</script>
</body>
</html>
